<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第五人格排位降溫日記</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="rage">
    <div class="stickers" aria-hidden="true">
      <div class="sticker sticker-left" id="themeStickerLeft">😡</div>
      <div class="sticker sticker-right" id="themeStickerRight">🔥</div>
    </div>

    <main class="app">
      <header class="app-header card">
        <div>
          <p class="date" id="todayDate"></p>
          <h1 id="mainTitle">本日紅溫紀錄</h1>
          <p class="tagline" id="themeTagline">先把怒氣倒出來，等等再說誰送分。</p>
        </div>
        <div class="theme-switcher" id="themeSwitcher"></div>
      </header>

      <section class="card diary-card">
        <h2>📝 今天排位日記</h2>
        <div class="temperature-wrap">
          <label for="rageMeter">今日紅溫值：<span id="rageLabel">50</span>/100</label>
          <input id="rageMeter" type="range" min="0" max="100" value="50" />
        </div>

        <div class="field-grid">
          <label>
            <span>快速輸入（情緒垃圾桶）</span>
            <input id="quickInput" type="text" placeholder="先打一行：我現在真的很想尖叫。" />
          </label>

          <label>
            <span>我現在心情</span>
            <input id="moodInput" type="text" placeholder="例如：火大、委屈、戀愛腦、想躺平" />
          </label>

          <label>
            <span>今天最雷的是誰 / 什麼事</span>
            <input id="worstInput" type="text" placeholder="例如：雙救人秒倒、我自己空刀四次" />
          </label>

          <label>
            <span>打完這篇後有比較冷靜嗎？</span>
            <select id="calmSelect">
              <option value="有">有，差點成佛</option>
              <option value="一點點">一點點，還在冒煙</option>
              <option value="沒有">沒有，我是火山</option>
            </select>
          </label>
        </div>

        <label class="diary-main-label">
          <span>今天發生什麼事（可長文怒噴）</span>
          <textarea id="diaryText" placeholder="把今天所有逆天操作都寫出來，不要客氣。"></textarea>
        </label>

        <div class="action-row">
          <button class="btn primary" id="saveDiaryBtn">💾 儲存今天紀錄</button>
          <button class="btn ghost" id="clearBtn">🧹 清空今天紀錄</button>
          <p class="calm-status" id="calmStatus">還沒寫，先吐槽一下再說。</p>
        </div>
      </section>

      <section class="card vent-card">
        <h2>🔘 發洩按鈕區</h2>
        <div class="vent-buttons">
          <button class="btn poop" id="poopBtn">💩 大便噴射</button>
          <button class="btn eye" id="eyeBtn">🙄💅 噴射白眼</button>
        </div>
        <div class="counter-box">
          <p>今日 💩：<strong id="poopCount">0</strong> 次</p>
          <p>今日 🙄💅：<strong id="eyeCount">0</strong> 次</p>
        </div>
        <div class="burst-layer" id="burstLayer" aria-hidden="true"></div>
      </section>

      <section class="card mini-game-card">
        <h2>🎯 小遊戲 1：射擊雷包隊友</h2>
        <div class="game-top-row">
          <p>剩餘時間：<span id="gameTime">15</span>s</p>
          <p>分數：<span id="gameScore">0</span></p>
          <button class="btn tiny" id="startGameBtn">開始射擊</button>
        </div>
        <div class="shooting-area" id="shootingArea">
          <button class="target" id="movingTarget" hidden>🤡 雷包</button>
          <p class="game-tip" id="gameTip">按「開始射擊」，在 15 秒內狂點雷包發洩。</p>
        </div>
      </section>

      <section class="card dressup-card">
        <h2>👗 小遊戲 2：換裝同人遊戲（骨架）</h2>
        <div class="dressup-layout">
          <div class="avatar-stage" id="avatarStage">
            <div class="layer base">底圖角色</div>
            <div class="layer hair" id="hairLayer">髮型 A</div>
            <div class="layer outfit" id="outfitLayer">衣服 A</div>
            <div class="layer accessory" id="accLayer">配件 A</div>
            <div class="layer expression" id="faceLayer">表情 A</div>
          </div>
          <div class="dressup-controls" id="dressupControls"></div>
        </div>
        <p class="hint">※ 這裡是 placeholder 圖層，未來可在 script.js 的 DRESSUP_DATA 替換成你自己的素材名稱與圖片路徑。</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
