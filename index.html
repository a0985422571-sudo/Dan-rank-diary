<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第五人格排位降溫日記 v0.3</title>
    <style>
      :root {
        --bg1: #ffe1d0;
        --bg2: #ff9f78;
        --card: #fff7f2;
        --text: #542b2b;
        --title-color: var(--text);
        --muted-text: color-mix(in srgb, var(--text) 78%, #ffffff 22%);
        --highlight-text: var(--text);
        --line: #ef8f6a;
        --accent: #ff5f46;
        --accent2: #ff936c;
        --chip: #ffd5c2;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        color: var(--text);
        min-height: 100vh;
        background: radial-gradient(circle at 20% 0%, var(--bg1), var(--bg2));
        transition: background 0.35s ease;
      }

      .wrap { width: min(920px, 95%); margin: 16px auto 24px; }

      .card {
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 20px;
        padding: 14px;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
      }

      .top { position: sticky; top: 8px; z-index: 30; display: grid; gap: 10px; margin-bottom: 12px; }
      .top-row { display: grid; grid-template-columns: 1fr; gap: 8px; }

      .date-box, .status-box {
        background: #fff;
        border: 2px dashed var(--line);
        border-radius: 12px;
        padding: 8px 10px;
        font-weight: 700;
      }

      .status-box { font-size: 0.92rem; }
      #saveStatus { color: var(--accent); }

      #diaryDate {
        margin-left: 8px;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 4px 8px;
        font-weight: 700;
      }

      .head { position: relative; }
      .stickers { position: absolute; right: 4px; top: -2px; opacity: 0.8; }

      h1 { margin: 4px 0; font-size: clamp(1.2rem, 1.7vw + 1rem, 1.9rem); color: var(--title-color); }
      .subtitle { margin: 0; opacity: 0.82; font-size: 0.94rem; color: var(--muted-text); }

      .theme-row { margin-top: 12px; display: grid; gap: 8px; grid-template-columns: repeat(2, 1fr); }

      button {
        cursor: pointer;
        border: 2px solid var(--line);
        border-radius: 12px;
        font-weight: 700;
        padding: 10px;
        color: var(--text);
        background: #fff;
        transition: transform 0.14s ease, filter 0.2s ease;
      }
      button:hover { transform: translateY(-1px); filter: brightness(1.02); }
      button:active { transform: scale(0.98); }
      button:disabled { opacity: 0.45; cursor: not-allowed; }

      .theme-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

      .section {
        margin-top: 12px;
        background: rgba(255, 255, 255, 0.55);
        border: 2px dotted var(--line);
        border-radius: 14px;
        padding: 10px;
      }
      .section h2 { margin: 0 0 8px; font-size: 1rem; }

      label { display: grid; gap: 5px; margin-bottom: 9px; font-weight: 700; font-size: 0.95rem; }

      input[type="text"], textarea, select {
        width: 100%;
        border: 2px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        font-size: 1rem;
        color: var(--text);
        background: #fff;
      }

      textarea { min-height: 118px; resize: vertical; }

      .mood-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
      .mood-btn { border-radius: 999px; padding: 7px 11px; }
      .mood-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

      .grid2 { display: grid; gap: 8px; }

      .heat-box { border: 2px dashed var(--line); border-radius: 12px; padding: 8px; background: #fff; }
      #heatValue { width: 100%; }
      .heat-meta { display: flex; justify-content: space-between; font-weight: 700; margin-top: 5px; }

      .quick-fill, .template-fill { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .quick-btn, .template-btn, .action-btn, .vent-btn { background: var(--chip); }
      .quick-btn, .template-btn { font-size: 0.9rem; line-height: 1.3; }
      .quick-btn, .template-btn, .history-summary { color: var(--muted-text); }

      .action-row { display: grid; grid-template-columns: 1fr; gap: 8px; }
      .action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

      .vent-grid { display: grid; gap: 8px; overflow: visible; }
      .vent-item { position: relative; overflow: visible; }
      .vent-meta { font-size: 0.93rem; font-weight: 700; }
      .vent-total { margin-top: 8px; font-size: 0.95rem; font-weight: 800; }
      .vent-level { margin-top: 4px; font-size: 0.88rem; color: var(--muted-text); font-weight: 700; }

      .vent-spray-zone {
        position: absolute;
        inset: -80px -28px -30px -28px;
        overflow: visible;
        pointer-events: none;
        z-index: 9;
      }
      .spray-emoji {
        position: absolute;
        left: var(--x);
        top: var(--y);
        font-size: 1.55rem;
        animation: sprayFloat var(--life, 900ms) ease-out forwards;
        will-change: transform, opacity;
      }

      @keyframes sprayFloat {
        from { transform: translate(0, 0) scale(0.75) rotate(0deg); opacity: 1; }
        to { transform: translate(var(--dx), var(--dy)) scale(1.2) rotate(var(--rot)); opacity: 0; }
      }

      .vent-btn.press-pop {
        filter: brightness(0.92);
        transform: scale(0.96);
      }
      .vent-btn { touch-action: manipulation; }

      .history-wrap { margin-top: 14px; }
      .history-list { display: grid; gap: 8px; }
      .history-item {
        border: 2px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255,255,255,0.8);
      }
      .history-head { display: flex; justify-content: space-between; gap: 8px; font-weight: 800; }
      .history-summary { margin: 6px 0 8px; font-size: 0.92rem; opacity: 0.9; }
      .history-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .danger { border-color: #d94747; color: #9b1f1f; }
      .history-detail {
        margin-top: 8px;
        border-top: 1px dashed var(--line);
        padding-top: 8px;
        font-size: 0.92rem;
        white-space: pre-wrap;
      }

      .empty-tip {
        border: 2px dashed var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #fff;
        font-size: 0.92rem;
      }

      .clear-btn { width: 100%; margin-top: 10px; }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%) translateY(20px);
        background: var(--accent);
        color: #fff;
        border: 2px solid #fff;
        padding: 10px 14px;
        border-radius: 999px;
        font-weight: 700;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 100;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      .copy-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: grid;
        place-items: center;
        z-index: 120;
        padding: 16px;
      }
      .copy-modal[hidden] { display: none; }
      .copy-modal-card {
        width: min(680px, 96vw);
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 14px;
        padding: 12px;
      }
      .copy-modal textarea {
        width: 100%;
        min-height: 180px;
        border: 2px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 0.95rem;
      }
      .copy-modal-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }

      .hidden { display: none !important; }

      /* ===== 雷包射擊場 ===== */
      .shooter-wrap { margin-top: 14px; }
      .shooter-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .shooter-title { margin: 0; color: var(--title-color); }
      .shooter-stage {
        margin-top: 10px;
        background: rgba(255,255,255,0.55);
        border: 2px dashed var(--line);
        border-radius: 14px;
        padding: 10px;
      }
      .target-view {
        position: relative;
        width: min(100%, 420px);
        aspect-ratio: 1 / 1;
        margin: 0 auto;
        border: 2px solid var(--line);
        border-radius: 16px;
        background: #000;
        overflow: hidden;
        display: grid;
        place-items: center;
      }
      .target-view img {
        width: calc(100% * var(--target-scale, 0.9));
        height: calc(100% * var(--target-scale, 0.9));
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }
      .target-fallback {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-weight: 800;
        color: #ffe0cf;
        background: #2a1d1d;
        text-align: center;
        padding: 10px;
      }
      .hit-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .hit-fx {
        position: absolute;
        left: var(--x);
        top: var(--y);
        color: #fff;
        font-weight: 900;
        text-shadow: 0 2px 8px rgba(0,0,0,0.65);
        animation: hitPop 700ms ease-out forwards;
      }
      @keyframes hitPop {
        from { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
        to { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.15); opacity: 0; }
      }
      .target-hit {
        animation: targetHit 180ms ease;
      }
      @keyframes targetHit {
        0% { transform: scale(1) rotate(0deg); }
        35% { transform: scale(0.95) rotate(-1.2deg); }
        75% { transform: scale(1.03) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .shooter-stats {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .stat-chip {
        background: #fff;
        border: 2px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        font-weight: 700;
        font-size: 0.93rem;
      }
      .shooter-actions, .target-switch {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .fire-btn {
        grid-column: 1 / -1;
        font-size: 1.1rem;
        padding: 14px;
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .shooter-comment {
        margin-top: 10px;
        border: 2px dotted var(--line);
        background: rgba(255,255,255,0.65);
        border-radius: 12px;
        padding: 10px;
        font-weight: 700;
        color: var(--muted-text);
      }

      @media (min-width: 760px) {
        .top-row { grid-template-columns: 1fr 1fr; }
        .theme-row { grid-template-columns: repeat(4, 1fr); }
        .grid2 { grid-template-columns: 1fr 1fr; }
        .quick-fill, .template-fill { grid-template-columns: repeat(3, 1fr); }
        .vent-grid { grid-template-columns: 1fr 1fr; }
        .action-row { grid-template-columns: repeat(5, 1fr); }
        .shooter-actions { grid-template-columns: repeat(4, 1fr); }
        .fire-btn { grid-column: auto; }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <section class="top">
        <div class="card top-row">
          <div class="date-box">
            今天哪一天：
            <input id="diaryDate" type="date" />
          </div>
          <div class="status-box">草稿狀態：<span id="saveStatus">未儲存</span></div>
        </div>
      </section>

      <main class="card" id="diaryCard">
        <header class="head">
          <div class="stickers" id="stickers">😡🔥💥</div>
          <h1 id="mainTitle">本日紅溫紀錄 😡🔥</h1>
          <p class="subtitle" id="subTitle">今天又被雷到了，先把火噴出來。</p>
        </header>

        <section class="theme-row" id="themeRow"></section>

        <section class="section">
          <h2>快速填入（一鍵發瘋）</h2>
          <div class="quick-fill" id="quickFill"></div>
        </section>

        <section class="section">
          <h2>主日記模板（只填主日記）</h2>
          <div class="template-fill" id="templateFill"></div>
        </section>

        <section class="section">
          <h2>排位降溫日記本體</h2>
          <label>
            先噴一句
            <input id="ventLine" type="text" placeholder="你現在最想罵什麼" />
          </label>
          <label>
            今天發生什麼事（主日記區）
            <textarea id="mainDiary" placeholder="今天哪一波最讓你想砸手機"></textarea>
          </label>

          <div class="grid2">
            <label>
              我現在心情（可複選）
              <div class="mood-wrap" id="moodWrap"></div>
              <small id="selectedMood">目前：未選擇</small>
            </label>
            <label>
              紅溫值
              <div class="heat-box">
                <input id="heatValue" type="range" min="0" max="100" step="25" value="50" />
                <div class="heat-meta">
                  <span id="heatNumber">50</span>
                  <span id="heatLabel">想翻白眼</span>
                </div>
              </div>
            </label>
          </div>

          <div class="grid2">
            <label>
              最雷的是誰 / 什麼事
              <input id="worstTarget" type="text" placeholder="今天最雷的是誰 / 哪件事" />
            </label>
            <label>
              打完這篇後有比較冷靜嗎？
              <select id="coolingLevel">
                <option value="有">有，至少不想砸手機了</option>
                <option value="一點點">一點點，還是有點火</option>
                <option value="沒有">沒有，我還在噴發</option>
              </select>
            </label>
          </div>

          <label>
            給自己一句話
            <input id="selfTalk" type="text" placeholder="今天辛苦了，先活下來，明天再戰" />
          </label>
        </section>

        <section class="section">
          <h2>發洩按鈕區（可連續噴射）</h2>
          <div class="vent-grid" id="ventGrid"></div>
          <div class="vent-total" id="ventTotal">今天噴了 0 次</div>
          <div class="vent-level" id="ventLevel">還沒開噴，先深呼吸。</div>
        </section>

        <section class="section">
          <h2>主要操作</h2>
          <div class="action-row">
            <button id="saveRecordBtn" class="action-btn primary" type="button">存成今天紀錄</button>
            <button id="copyExportBtn" class="action-btn" type="button">匯出文字（複製）</button>
            <button id="downloadExportBtn" class="action-btn" type="button">匯出文字（下載）</button>
            <button id="shareShotBtn" class="action-btn" type="button">截圖分享</button>
            <button id="openShooterBtn" class="action-btn" type="button">進入雷包射擊場</button>
          </div>
        </section>

        <button class="clear-btn" id="clearTodayBtn" type="button">清空今天草稿</button>
      </main>

      <section class="card history-wrap">
        <h2>歷史紀錄</h2>
        <div style="display:grid;gap:8px;grid-template-columns:1fr 1fr;">
          <button id="clearHistoryBtn" type="button" class="danger">清空全部歷史</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <section class="card shooter-wrap hidden" id="shooterView">
        <div class="shooter-head">
          <h2 class="shooter-title">雷包射擊場</h2>
          <button type="button" id="backDiaryBtn">← 返回日記</button>
        </div>

        <div class="shooter-stage">
          <div class="target-view" id="targetView">
            <img id="targetImage" alt="雷包標靶" />
            <div class="target-fallback hidden" id="targetFallback">標靶載入失敗</div>
            <div class="hit-layer" id="hitLayer"></div>
          </div>

          <div class="target-switch">
            <button type="button" id="prevTargetBtn">上一個標靶</button>
            <button type="button" id="nextTargetBtn">下一個標靶</button>
          </div>

          <div class="shooter-stats">
            <div class="stat-chip">命中次數：<span id="hitCount">0</span></div>
            <div class="stat-chip">本輪射擊：<span id="shotCount">0</span></div>
            <div class="stat-chip">最高紀錄：<span id="bestShotCount">0</span></div>
            <div class="stat-chip">目前標靶：<span id="currentTargetName">雷包01</span></div>
          </div>

          <div class="shooter-actions">
            <button type="button" class="fire-btn" id="fireBtn">發射</button>
            <button type="button" id="resetRoundBtn">重置本輪</button>
            <button type="button" id="randomTargetBtn">隨機雷包</button>
          </div>

          <div class="shooter-comment" id="shooterComment">今天很克制，先記你一功。</div>
        </div>
      </section>
    </div>

    <div id="toast" class="toast">已存成今天紀錄</div>
    <div id="copyModal" class="copy-modal" hidden>
      <div class="copy-modal-card">
        <strong>系統複製失敗，已開啟手動複製框</strong>
        <p style="margin:6px 0 8px;font-size:0.9rem;opacity:0.85;">請長按/全選下面文字後複製。</p>
        <textarea id="manualCopyText" readonly></textarea>
        <div class="copy-modal-actions">
          <button type="button" id="manualSelectBtn">全選文字</button>
          <button type="button" id="manualCloseBtn">關閉</button>
        </div>
      </div>
    </div>

    <script>
      // =============================
      // localStorage key 規劃
      // draftsByDate: { "2026-04-20": {...草稿...}, ... }
      // historyRecords: [{id, date, savedAt, ...}, ...]
      // =============================
      const STORAGE_KEYS = {
        draftsByDate: "rankDiary_draftsByDate",
        historyRecords: "rankDiary_historyRecords",
        selectedDate: "rankDiary_selectedDate",
      };

      const HEAT_LABELS = { 0: "還行", 25: "有點煩", 50: "想翻白眼", 75: "想卸載", 100: "我現在就是💩噴射器" };
      const VENT_LABELS = {
        poop: "💩 大便噴射",
        eyeRoll: "🙄💅 白眼噴射",
      };

      const themes = {
        rage: {
          name: "被雷到紅溫了",
          title: "本日紅溫紀錄 😡🔥",
          subtitle: "今天又被雷到了，先把火噴出來。",
          stickers: "😡🔥💥",
          colors: ["#ffe1d0", "#ff9f78", "#fff7f2", "#542b2b", "#ef8f6a", "#ff5f46", "#ff936c", "#ffd5c2"],
          placeholders: ["你現在最想罵什麼", "今天哪一波最讓你想砸手機", "今天最雷的是誰 / 哪件事"],
        },
        love: {
          name: "想卸載，但老公還在",
          title: "退坑失敗日記 😭💕",
          subtitle: "今天本來想卸載，想到夢角又忍住了。",
          stickers: "😭💔💕",
          colors: ["#ffe8f5", "#ffb3d9", "#fff8fc", "#653351", "#ef87bc", "#f05aa6", "#ff95c9", "#ffd8ec"],
          placeholders: ["今天又是因為誰沒辦法退坑", "今天發生什麼讓你一邊崩潰一邊留在坑裡", "今天最讓你心碎的是什麼"],
        },
        shame: {
          name: "我今天拉了一坨",
          title: "今日社死懺悔錄 🥹💦",
          subtitle: "打得爛到怕被匿名公審，先寫下來。",
          stickers: "🥹💦🫠",
          colors: ["#dde8ff", "#a2b7df", "#f6f9ff", "#304164", "#819cc9", "#617fc9", "#89a5e1", "#d8e4ff"],
          placeholders: ["你現在最想替自己找什麼藉口", "今天哪一波最值得社死", "今天你最怕別人拿哪件事公審你"],
        },
        boss: {
          name: "老子才是老大",
          title: "今天我最大 👑",
          subtitle: "不爽被問、不爽被催、不爽被情勒。",
          stickers: "👑🖤🥀",
          colors: ["#181818", "#311111", "#151515", "#b7a077", "#5f4822", "#9b7a35", "#6f2424", "#262220"],
          textLayers: { title: "#d2bc88", body: "#b7a077", muted: "#9f9275", highlight: "#c6af7f" },
          placeholders: ["先一句：今天誰在那邊問問問", "把你的不爽與邊界一次講完", "今天最不爽被催的事"],
        },
      };

      const moods = ["崩潰", "爆氣", "委屈", "麻了", "勉強活著", "老大模式"];

      const quickFillItems = [
        { label: "今天被雷到爆氣", apply: (s) => ({ ...s, theme: "rage", moods: addMood(s.moods, "爆氣"), worstTarget: s.worstTarget || "神奇路人隊友", mainDiary: s.mainDiary || "今天又被雷到，心態直接裂開。" }) },

      }

      function formatDate(dateStr) {

      function nowTimeStamp() {

        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        const s = String(d.getSeconds()).padStart(2, "0");
        return `${y}-${m}-${day} ${h}:${min}:${s}`;

      function loadDraft(date) {
        const draft = draftsByDate[date];
        if (!draft) {
          setDraftStatus(`已載入 ${formatDate(date)} 的空白草稿`);
          return getDefaultDraft();
        }
        const merged = { ...getDefaultDraft(), ...draft };
        const oldCounts = draft.ventCounts || {};
        merged.ventCounts = {
          ...getDefaultDraft().ventCounts,
          ...oldCounts,
          eyeRoll: oldCounts.eyeRoll ?? oldCounts.eyeroll ?? 0, // 向後相容舊 key
        };
        merged.moods = Array.isArray(draft.moods) ? draft.moods : draft.mood ? [draft.mood] : [];
        setDraftStatus(`已載入 ${formatDate(date)} 的草稿`);
        return merged;
      }

      // 以「按鈕容器」為基準產生局部噴射，避免噴到畫面角落
      function emitLocalSpray(zoneEl, emojiList, origin) {
        const rect = zoneEl.getBoundingClientRect();
        const burstCount = 3 + Math.floor(Math.random() * 4); // 3~6
        const baseX = origin?.x ?? rect.width / 2;
        const baseY = origin?.y ?? rect.height * 0.62;

        for (let i = 0; i < burstCount; i++) {
          const node = document.createElement("span");
          node.className = "spray-emoji";
          node.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];
          const spreadX = -22 + Math.random() * 44; // 手機上保持按鈕附近
          const spreadY = -8 + Math.random() * 22;
          const dx = -70 + Math.random() * 140;
          const dy = -110 - Math.random() * 90;
          const rot = -90 + Math.random() * 180;
          const lifeMs = 700 + Math.floor(Math.random() * 500);
          const scale = (0.9 + Math.random() * 0.35).toFixed(2);

          node.style.setProperty("--x", `${baseX + spreadX}px`);
          node.style.setProperty("--y", `${baseY + spreadY}px`);
          node.style.setProperty("--dx", `${dx}px`);
          node.style.setProperty("--dy", `${dy}px`);
          node.style.setProperty("--rot", `${rot}deg`);
          node.style.setProperty("--life", `${lifeMs}ms`);
          node.style.transform = `scale(${scale})`;

          zoneEl.appendChild(node);
          node.addEventListener("animationend", () => node.remove(), { once: true });
        }
      }

      function ventLevelText(total) {
        if (total <= 0) return "還沒開噴，先深呼吸。";

        if (total <= 15) return "進入噴射模式：手感開始來了。";
        if (total <= 30) return "今天火力很足：你真的很努力在降溫。";
        return "今日紅溫戰神：噴射器已進入神話級。";
      }

      function renderVentModule() {
        ventGridEl.innerHTML = "";
        ventConfigs.forEach((cfg) => {
          const wrap = document.createElement("div");
          wrap.className = "vent-item";
          const btn = document.createElement("button");
          const meta = document.createElement("div");
          const sprayZone = document.createElement("div");
          const count = Number(state.ventCounts[cfg.key] || 0);
          btn.type = "button";
          btn.className = "vent-btn";
          btn.textContent = VENT_LABELS[cfg.key] || `${cfg.emoji} ${cfg.label}`;
          meta.className = "vent-meta";
          meta.textContent = `今日 ${cfg.label}：${count} 次`;

          sprayZone.className = "vent-spray-zone";
          sprayZone.setAttribute("aria-hidden", "true");

          const applySingleSpray = (evt) => {
            state.ventCounts[cfg.key] = (state.ventCounts[cfg.key] || 0) + 1;
            const newCount = state.ventCounts[cfg.key];
            const randomTxt = cfg.feedbacks[Math.floor(Math.random() * cfg.feedbacks.length)];
            meta.textContent = `今日 ${cfg.label}：${newCount} 次｜${randomTxt}`;
            const rect = sprayZone.getBoundingClientRect();
            const hasPoint = evt && typeof evt.clientX === "number" && typeof evt.clientY === "number";
            const origin = hasPoint
              ? {
                  x: Math.min(Math.max(20, evt.clientX - rect.left), rect.width - 20),
                  y: Math.min(Math.max(20, evt.clientY - rect.top), rect.height - 20),
                }
              : { x: rect.width / 2, y: rect.height * 0.62 };
            emitLocalSpray(sprayZone, cfg.burst, origin);
            btn.classList.remove("press-pop");
            void btn.offsetWidth;
            btn.classList.add("press-pop");
            setTimeout(() => btn.classList.remove("press-pop"), 130);
            updateVentTotal();
            saveDraft();
          };

          // Pointer 事件：短按 1 次；長壓 250ms 後每 100ms 連續噴射
          let holdDelayTimer = null;
          let holdInterval = null;
          let isHolding = false;
          let longPressMode = false;

          const clearHoldTimers = () => {
            if (holdDelayTimer) clearTimeout(holdDelayTimer);
            if (holdInterval) clearInterval(holdInterval);
            holdDelayTimer = null;
            holdInterval = null;
            isHolding = false;
          };

          btn.addEventListener("pointerdown", (evt) => {
            if (evt.pointerType === "mouse" && evt.button !== 0) return;
            evt.preventDefault();
            isHolding = true;
            longPressMode = false;
            holdDelayTimer = setTimeout(() => {
              if (!isHolding) return;
              longPressMode = true;
              applySingleSpray();
              holdInterval = setInterval(() => applySingleSpray(), 100);
            }, 250);
          });

          const stopHold = (evt) => {
            if (!isHolding) return;
            const wasLong = longPressMode;
            clearHoldTimers();
            // 未進入長壓才算短按單次，避免重複計數
            if (!wasLong) applySingleSpray(evt);
          };

          btn.addEventListener("pointerup", stopHold);
          btn.addEventListener("pointercancel", stopHold);
          btn.addEventListener("pointerleave", stopHold);
          btn.addEventListener("lostpointercapture", stopHold);

          // 某些行動瀏覽器保底事件
          btn.addEventListener("touchend", stopHold, { passive: true });
          btn.addEventListener("touchcancel", stopHold, { passive: true });

          wrap.appendChild(sprayZone);
          wrap.appendChild(btn);
          wrap.appendChild(meta);
          ventGridEl.appendChild(wrap);
        });
        updateVentTotal();
      }

日期：${formatDate(record.date)}

主日記：
${record.diary || "（空）"}
收尾：${record.closing || "（空）"}
            </div>
          `;

          const detail = item.querySelector(".history-detail");
          item.querySelector('[data-action="toggle"]').addEventListener("click", () => {
            detail.hidden = !detail.hidden;
          });

          item.querySelector('[data-action="load"]').addEventListener("click", () => {
            currentDate = record.date;

              ...getDefaultDraft(),

            renderAll();

          });

          item.querySelector('[data-action="delete"]').addEventListener("click", () => {
            const ok = window.confirm("確定刪除這筆正式紀錄嗎？");
            if (!ok) return;
            historyRecords = historyRecords.filter((r) => r.id !== record.id);
            writeJSON(STORAGE_KEYS.historyRecords, historyRecords);
            renderHistory();
            showToast("已刪除這筆紀錄");
          });

          historyListEl.appendChild(item);
        });
      }

      // 共用匯出文字產生器，複製與下載都走同一份格式
      function buildExportText(recordLike) {
        const poopCount = Number(recordLike.ventCounts?.poop || recordLike.poopCount || 0);
        const eyeRollCount = Number(recordLike.ventCounts?.eyeRoll || recordLike.ventCounts?.eyeroll || recordLike.eyeRollCount || 0);
        const total = poopCount + eyeRollCount;
        const moodsText = (recordLike.moods || []).join("、") || "（未選）";
        const themeName = themes[recordLike.theme]?.name || themes[state.theme]?.name || "未設定";
        const quickTemplate = recordLike.lastQuickTemplate || recordLike.quickTemplate || "（未套用）";
        const mainTemplate = recordLike.lastMainTemplate || recordLike.mainTemplate || "（未套用）";
        const rageValue = recordLike.heatValue ?? recordLike.rageValue ?? 50;
        const opener = recordLike.ventLine ?? recordLike.opener ?? "（空）";
        const diary = recordLike.mainDiary ?? recordLike.diary ?? "（空）";
        const closing = recordLike.selfTalk ?? recordLike.closing ?? "（空）";

        return `日期：${formatDate(currentDate)}\n主題：${themeName}\n快速填入：${quickTemplate}\n主日記模板：${mainTemplate}\n紅溫值：${rageValue}\n先噴一句：${opener}\n主日記：\n${diary}\n心情：\n${moodsText}\n💩噴射：${poopCount} 次\n🙄💅噴射：${eyeRollCount} 次\n總噴射：${total} 次\n給自己一句話：\n${closing}`;
      }

      function openManualCopyModal(text) {
        manualCopyTextEl.value = text;
        copyModalEl.hidden = false;
        manualCopyTextEl.focus();
        manualCopyTextEl.select();
      }

      function fallbackCopyText(text) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        ta.style.top = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        let ok = false;
        try {
          ok = document.execCommand("copy");
        } catch {
          ok = false;
        }
        ta.remove();
        return ok;
      }

      async function copyExportText() {
        const text = buildExportText(state);
        try {
          await navigator.clipboard.writeText(text);
          showToast("已複製文字，可直接貼給朋友或存備份");
        } catch {
          const fallbackOk = fallbackCopyText(text);
          if (fallbackOk) {
            showToast("已改用備援複製，文字已複製");
            return;
          }
          openManualCopyModal(text);
          showToast("系統複製失敗，已開啟手動複製框");
        }
      }

      function downloadExportText() {
        const text = buildExportText(state);
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `rankDiary_${currentDate}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast("匯出成功（已下載 txt）");
      }

      async function shareScreenshot() {
        if (typeof html2canvas === "undefined") {
          showToast("截圖套件尚未載入");
          return;
        }

        const canvas = await html2canvas(diaryCardEl, { scale: 2, backgroundColor: null });

        // 優先嘗試 Web Share API 分享檔案
        canvas.toBlob(async (blob) => {
          if (!blob) return showToast("截圖失敗");

          const file = new File([blob], `rankDiary_${currentDate}.png`, { type: "image/png" });
          const canShareFile = navigator.canShare && navigator.canShare({ files: [file] });

          if (navigator.share && canShareFile) {
            try {
              await navigator.share({ files: [file], title: "第五人格排位降溫日記" });
              showToast("截圖分享成功");
              return;
            } catch {
              // 使用者取消或平台失敗時，直接 fallback 到下載
            }
          }

          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `rankDiary_${currentDate}.png`;
          a.click();
          URL.revokeObjectURL(a.href);
          showToast("不支援分享，已下載 PNG");
        }, "image/png");
      }

      function getShooterComment(count) {
        if (count <= 5) return "今天很克制，先記你一功。";
        if (count <= 15) return "有在發洩，但還沒進入暴走狀態。";
        if (count <= 30) return "看來今天真的被雷到了。";
        if (count <= 60) return "你今天不是普通噴射器，是戰術轟炸機。";
        return "雷包已被宇宙送走。";
      }

      function saveShooterData() {
        localStorage.setItem(
          SHOOTER_STORAGE_KEY,
          JSON.stringify({
            bestShots: shooterState.bestShots,
            currentTargetIndex: shooterState.currentTargetIndex,
          })
        );
      }

      function loadShooterData() {
        const raw = localStorage.getItem(SHOOTER_STORAGE_KEY);
        if (!raw) return;
        try {
          const data = JSON.parse(raw);
          shooterState.bestShots = Number(data.bestShots || 0);
          shooterState.currentTargetIndex = Math.max(
            0,
            Math.min(targets.length - 1, Number(data.currentTargetIndex || 0))
          );
        } catch {
          // ignore bad data
        }
      }

      function updateShooterStats() {
        hitCountEl.textContent = String(shooterState.hits);
        shotCountEl.textContent = String(shooterState.shots);
        bestShotCountEl.textContent = String(shooterState.bestShots);
        shooterCommentEl.textContent = getShooterComment(shooterState.shots);
        currentTargetNameEl.textContent = targets[shooterState.currentTargetIndex]?.name || "雷包";
      }

      function clearHitEffects() {
        hitLayerEl.innerHTML = "";
      }

      function spawnHitText() {
        const words = ["砰！", "中！", "雷爆！", "命中！"];
        const fx = document.createElement("span");
        fx.className = "hit-fx";
        fx.textContent = words[Math.floor(Math.random() * words.length)];
        fx.style.setProperty("--x", `${30 + Math.random() * 40}%`);
        fx.style.setProperty("--y", `${35 + Math.random() * 35}%`);
        fx.style.setProperty("--dx", `${-20 + Math.random() * 40}px`);
        fx.style.setProperty("--dy", `${-40 - Math.random() * 40}px`);
        hitLayerEl.appendChild(fx);
        fx.addEventListener("animationend", () => fx.remove(), { once: true });
      }

      function switchTarget(index) {
        const safeIndex = (index + targets.length) % targets.length;
        shooterState.currentTargetIndex = safeIndex;
        saveShooterData();
        clearHitEffects();
        renderShooterGame();
      }

      function renderShooterGame() {
        document.documentElement.style.setProperty("--target-scale", TARGET_SCALE);
        const target = targets[shooterState.currentTargetIndex];
        targetImageEl.classList.remove("hidden");
        targetFallbackEl.classList.add("hidden");
        targetImageEl.src = `${TARGET_BASE_PATH}${target.image}`;
        targetImageEl.alt = target.name;
        updateShooterStats();
      }

      function fireShot() {
        shooterState.shots += 1;
        shooterState.hits += 1;
        shooterState.bestShots = Math.max(shooterState.bestShots, shooterState.shots);
        saveShooterData();
        updateShooterStats();
        targetImageEl.classList.remove("target-hit");
        void targetImageEl.offsetWidth;
        targetImageEl.classList.add("target-hit");
        spawnHitText();
      }

      /*
        長按連發速度在這裡調：
        - 長按啟動延遲：250ms
        - 連發間隔：140ms（可改 120~180ms）
      */
      function startAutoFire() {
        stopAutoFire();
        shooterAutoTimer = setTimeout(() => {
          fireShot();
          shooterAutoInterval = setInterval(fireShot, 140);
        }, 250);
      }

      function stopAutoFire() {
        if (shooterAutoTimer) clearTimeout(shooterAutoTimer);
        if (shooterAutoInterval) clearInterval(shooterAutoInterval);
        shooterAutoTimer = null;
        shooterAutoInterval = null;
      }

      function bindShooterEvents() {
        openShooterBtnEl.addEventListener("click", () => {
          document.getElementById("diaryCard").classList.add("hidden");
          document.querySelector(".history-wrap").classList.add("hidden");
          shooterViewEl.classList.remove("hidden");
          renderShooterGame();
        });

        backDiaryBtnEl.addEventListener("click", () => {
          shooterViewEl.classList.add("hidden");
          document.getElementById("diaryCard").classList.remove("hidden");
          document.querySelector(".history-wrap").classList.remove("hidden");
          stopAutoFire();
        });

        prevTargetBtnEl.addEventListener("click", () => switchTarget(shooterState.currentTargetIndex - 1));
        nextTargetBtnEl.addEventListener("click", () => switchTarget(shooterState.currentTargetIndex + 1));
        randomTargetBtnEl.addEventListener("click", () => {
          switchTarget(Math.floor(Math.random() * targets.length));
        });
        resetRoundBtnEl.addEventListener("click", () => {
          shooterState.shots = 0;
          shooterState.hits = 0;
          updateShooterStats();
          clearHitEffects();
        });

        const fireDown = (evt) => {
          evt.preventDefault();
          startAutoFire();
        };
        const fireUp = () => {
          if (!shooterAutoInterval && shooterAutoTimer) {
            // 短按：尚未進入連發時，放開補一發
            fireShot();
          }
          stopAutoFire();
        };

        fireBtnEl.addEventListener("mousedown", fireDown);
        fireBtnEl.addEventListener("mouseup", fireUp);
        fireBtnEl.addEventListener("mouseleave", fireUp);
        fireBtnEl.addEventListener("touchstart", fireDown, { passive: false });
        fireBtnEl.addEventListener("touchend", fireUp, { passive: true });
        fireBtnEl.addEventListener("touchcancel", fireUp, { passive: true });

        targetImageEl.addEventListener("error", () => {
          targetImageEl.classList.add("hidden");
          targetFallbackEl.classList.remove("hidden");
          const target = targets[shooterState.currentTargetIndex];
          targetFallbackEl.textContent = `標靶載入失敗：${target?.image || "未知檔名"}`;
        });
      }

      function renderAll() {
        diaryDateEl.value = currentDate;
        applyTheme(state.theme);
        renderThemeButtons();
        renderQuickFill();
        renderTemplates();
        renderMoodButtons();
        renderHeat();
        renderFormFields();
        renderVentModule();
        renderHistory();
      }

      // 事件：日期切換 -> 載入草稿
      diaryDateEl.addEventListener("change", () => {
        if (!diaryDateEl.value) return;
        currentDate = diaryDateEl.value;
        localStorage.setItem(STORAGE_KEYS.selectedDate, currentDate);
        state = loadDraft(currentDate);
        renderAll();
      });

      // 事件：欄位輸入 -> 草稿自動儲存
      ventLineEl.addEventListener("input", () => {
        state.ventLine = ventLineEl.value;
        saveDraft();
      });
      mainDiaryEl.addEventListener("input", () => {
        state.mainDiary = mainDiaryEl.value;
        saveDraft();
      });
      worstTargetEl.addEventListener("input", () => {
        state.worstTarget = worstTargetEl.value;
        saveDraft();
      });
      coolingLevelEl.addEventListener("change", () => {
        state.coolingLevel = coolingLevelEl.value;
        saveDraft();
      });
      selfTalkEl.addEventListener("input", () => {
        state.selfTalk = selfTalkEl.value;
        saveDraft();
      });
      heatValueEl.addEventListener("input", () => {
        state.heatValue = Number(heatValueEl.value);
        renderHeat();
        saveDraft();
      });

      // 主要操作
      saveRecordBtnEl.addEventListener("click", () => {
        const record = buildRecordFromState();
        historyRecords.push(record);
        writeJSON(STORAGE_KEYS.historyRecords, historyRecords);
        renderHistory();
        showToast("存檔成功，已加入歷史紀錄");
      });

      copyExportBtnEl.addEventListener("click", copyExportText);
      downloadExportBtnEl.addEventListener("click", downloadExportText);
      shareShotBtnEl.addEventListener("click", shareScreenshot);
      manualSelectBtnEl.addEventListener("click", () => {
        manualCopyTextEl.focus();
        manualCopyTextEl.select();
        manualCopyTextEl.setSelectionRange(0, manualCopyTextEl.value.length);
      });
      manualCloseBtnEl.addEventListener("click", () => {
        copyModalEl.hidden = true;
      });
      copyModalEl.addEventListener("click", (event) => {
        if (event.target === copyModalEl) copyModalEl.hidden = true;
      });

      // 清空目前日期草稿
      clearTodayBtnEl.addEventListener("click", () => {
        const ok = window.confirm(`確定清空 ${formatDate(currentDate)} 的草稿嗎？`);
        if (!ok) return;
        state = getDefaultDraft();
        draftsByDate[currentDate] = { ...state };
        writeJSON(STORAGE_KEYS.draftsByDate, draftsByDate);
        renderAll();
        setDraftStatus(`已清空 ${formatDate(currentDate)} 草稿`);
        showToast("已清空今天草稿");
      });

      // 清空全部正式歷史
      clearHistoryBtnEl.addEventListener("click", () => {
        const ok = window.confirm("確定清空全部歷史紀錄嗎？此動作無法復原。");
        if (!ok) return;
        historyRecords = [];
        writeJSON(STORAGE_KEYS.historyRecords, historyRecords);
        renderHistory();
        showToast("全部歷史紀錄已清空");
      });

      // 初始渲染
      loadShooterData();
      bindShooterEvents();
      renderShooterGame();
      renderAll();
    </script>
  </body>
</html>
