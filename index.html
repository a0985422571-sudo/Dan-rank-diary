<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dan Dan 日記整理器</title>
    <style>
      :root {
        --bg: #fff8fc;
        --bg-accent: #ffeaf5;
        --bg-decor-1: radial-gradient(circle at 8% 18%, rgba(255, 147, 196, 0.16) 0, rgba(255, 147, 196, 0.16) 9px, transparent 10px);
        --bg-decor-2: radial-gradient(circle at 92% 84%, rgba(255, 255, 255, 0.65) 0, rgba(255, 255, 255, 0.65) 6px, transparent 7px);
        --bg-decor-3: radial-gradient(circle at 82% 16%, rgba(255, 188, 221, 0.2) 0, rgba(255, 188, 221, 0.2) 10px, transparent 11px);
        --corner-decor: radial-gradient(circle at top right, rgba(255, 171, 211, 0.24), transparent 56%);
        --card: #ffffff;
        --card-soft: #fffcfe;
        --primary: #ff7eb6;
        --primary-dark: #ff5da6;
        --text: #4b3e4d;
        --muted: #8f7b8f;
        --line: #f7d5e7;
        --shadow: rgba(255, 126, 182, 0.14);
        --btn-soft-bg: #ffe2f0;
        --btn-soft-text: #9e3e71;
        --btn-soft-hover: #ffd0e6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background:
          var(--bg-decor-1),
          var(--bg-decor-2),
          var(--bg-decor-3),
          radial-gradient(circle at top, var(--bg-accent), var(--bg));
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app {
        position: relative;
        width: min(920px, 100%);
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 8px 24px var(--shadow);
        padding: 24px;
        overflow: hidden;
      }

      .app::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: var(--corner-decor);
        opacity: 0.9;
      }

      .app-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .title-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .today-date {
        font-size: 0.92rem;
        color: var(--muted);
      }

      .theme-select {
        border: 2px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        color: var(--text);
        background: var(--card);
        font-size: 0.92rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2vw + 1rem, 2.1rem);
        color: var(--primary-dark);
      }

      .subtitle {
        margin: 8px 0 20px;
        color: var(--muted);
      }

      textarea,
      input {
        width: 100%;
        min-height: 220px;
        padding: 14px;
        border-radius: 14px;
        border: 2px solid var(--line);
        resize: vertical;
        font-size: 1rem;
        line-height: 1.7;
        background: var(--card-soft);
        color: var(--text);
        caret-color: var(--primary-dark);
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          background-color 0.18s ease;
      }

      input {
        min-height: auto;
        line-height: 1.4;
        resize: none;
      }

      textarea::placeholder,
      input::placeholder {
        color: var(--muted);
        opacity: 1;
      }

      textarea:hover,
      input:hover {
        border-color: color-mix(in srgb, var(--line) 60%, var(--primary) 40%);
      }

      textarea:focus,
      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 28%, transparent);
      }

      .controls {
        display: flex;
        gap: 12px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .mood-helper {
        margin-top: 14px;
      }

      .mood-helper-title {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .mood-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .mood-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
        font-weight: 600;
        padding: 8px 12px;
      }

      .mood-btn:hover {
        background: var(--btn-soft-hover);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        font-size: 0.96rem;
        font-weight: 700;
        cursor: pointer;
      }

      .organize-btn {
        background: var(--primary);
        color: #fff;
      }

      .organize-btn:hover {
        background: var(--primary-dark);
      }

      .clear-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
      }

      .clear-btn:hover {
        background: var(--btn-soft-hover);
      }

      .copy-all-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
      }

      .copy-all-btn:hover {
        background: var(--btn-soft-hover);
      }

      .export-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
      }

      .export-btn:hover {
        background: var(--btn-soft-hover);
      }

      .jet-wrap {
        margin-top: 10px;
        min-height: 34px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .jet-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
      }

      .jet-btn:hover {
        background: var(--btn-soft-hover);
      }

      .jet-output {
        font-size: 1.2rem;
        color: var(--text);
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .jet-output.show {
        opacity: 1;
      }

      .tomorrow-wrap {
        margin-top: 14px;
      }

      .tomorrow-wrap label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      #tomorrowNoteInput {
        min-height: 100px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-top: 22px;
      }

      .card {
        border: 2px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        background: var(--card-soft);
      }

      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .card h2 {
        margin: 0;
        font-size: 1rem;
        color: var(--primary-dark);
      }

      .copy-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
        font-size: 0.85rem;
        padding: 6px 12px;
      }

      .copy-btn:hover {
        background: var(--btn-soft-hover);
      }

      .output {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.7;
        min-height: 64px;
      }

      .hint {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .encouragement {
        margin-top: 12px;
        padding: 10px 14px;
        border: 2px dashed var(--line);
        border-radius: 12px;
        background: var(--card-soft);
        color: var(--muted);
        font-size: 0.93rem;
      }

      .history {
        margin-top: 24px;
        border-top: 2px dashed var(--line);
        padding-top: 18px;
      }

      .history h2 {
        margin: 0 0 10px;
        color: var(--primary-dark);
        font-size: 1.05rem;
      }

      .history-empty {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .history details {
        position: relative;
        border: 2px solid var(--line);
        background: var(--card-soft);
        border-radius: 12px;
        padding: 10px 12px;
        margin-top: 10px;
      }

      .history summary {
        cursor: pointer;
        font-weight: 700;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .history-summary-text {
        flex: 1;
        min-width: 0;
      }

      .history-delete-btn {
        border: 2px solid var(--line);
        border-radius: 999px;
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
        font-size: 0.78rem;
        font-weight: 700;
        padding: 4px 10px;
      }

      .history-delete-btn:hover {
        background: var(--btn-soft-hover);
      }

      .history-item-content {
        margin-top: 10px;
        line-height: 1.6;
        white-space: pre-wrap;
        font-size: 0.94rem;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="app-head">
        <div class="title-wrap">
          <h1>✨ Dan Dan 日記整理器</h1>
          <span class="today-date" id="todayDate">今日日期：----</span>
        </div>
        <label>
          <span style="font-size: 0.9rem; color: var(--muted); margin-right: 6px">主題</span>
          <select id="themeSelect" class="theme-select">
            <option value="pink">粉紅膠囊</option>
            <option value="starry">星空色</option>
            <option value="matcha">抹茶拿鐵</option>
            <option value="sunset">夕陽橘</option>
            <option value="falconWatch">侏儒獵鷹觀察模式</option>
            <option value="starCookie">星餅乾宇宙</option>
            <option value="mintSoda">薄荷汽水</option>
          </select>
        </label>
      </div>
      <p class="subtitle">把今天的想法貼進來，一鍵整理成可愛好讀的小回報。</p>

      <textarea id="diaryInput" placeholder="例：今天早上開會有點緊張，但下午完成了重要提案，心情變超好！"></textarea>
      <div class="controls">
        <button class="organize-btn" id="organizeBtn">整理日記</button>
        <button class="clear-btn" id="clearBtn">清空全部</button>
        <button class="copy-all-btn" id="copyAllBtn">一鍵複製全部</button>
        <button class="export-btn" id="exportTxtBtn">匯出 txt</button>
      </div>
      <div class="jet-wrap">
        <button class="jet-btn" id="jetBtn">今日噴射</button>
        <span class="jet-output" id="jetOutput" aria-live="polite"></span>
      </div>

      <section class="mood-helper">
        <p class="mood-helper-title">今日情緒快捷鍵（懶得打字版）</p>
        <div class="mood-buttons">
          <button class="mood-btn" data-mood="開心、被愛、有活力">🥺❤️ 開心</button>
          <button class="mood-btn" data-mood="混亂、卡住、腦袋打結">😵‍💫 混亂</button>
          <button class="mood-btn" data-mood="感動、被治癒、想抱抱">🥹 感動</button>
          <button class="mood-btn" data-mood="吐槽、無言、但還是撐住">🙄🤌 吐槽</button>
          <button class="mood-btn" data-mood="累、想躺平、需要充電">😴 累</button>
        </div>
      </section>

      <div class="tomorrow-wrap">
        <label for="tomorrowNoteInput">明天要記得</label>
        <textarea id="tomorrowNoteInput" placeholder="例：早上 9:00 前寄出會議簡報、記得買牛奶。"></textarea>
      </div>

      <section class="grid">
        <article class="card">
          <div class="card-head">
            <h2>今日日記</h2>
            <button class="copy-btn" data-copy="fullDiary">一鍵複製</button>
          </div>
          <p class="output" id="fullDiary">（整理後會顯示在這裡）</p>
        </article>

        <article class="card">
          <div class="card-head">
            <h2>小蝦蝦版短版回報</h2>
            <button class="copy-btn" data-copy="shortReport">一鍵複製</button>
          </div>
          <p class="output" id="shortReport">（整理後會顯示在這裡）</p>
        </article>

        <article class="card">
          <div class="card-head">
            <h2>今日金句</h2>
            <button class="copy-btn" data-copy="quote">一鍵複製</button>
          </div>
          <p class="output" id="quote">（整理後會顯示在這裡）</p>
        </article>

        <article class="card">
          <div class="card-head">
            <h2>今日情緒關鍵字</h2>
            <button class="copy-btn" data-copy="mood">一鍵複製</button>
          </div>
          <p class="output" id="mood">（整理後會顯示在這裡）</p>
        </article>
      </section>

      <p class="encouragement" id="encouragement">（整理完會跳出一句小鼓勵）</p>

      <section class="history" id="historySection">
        <h2>🗂️ 歷史紀錄（最近 7 篇）</h2>
        <p class="history-empty" id="historyEmpty">目前還沒有歷史紀錄，先整理一篇看看吧～</p>
        <div id="historyList"></div>
      </section>

      <p class="hint">小提醒：這是前端離線小工具，內容不會被上傳。</p>
    </main>

        mintSoda: {

          bgDecor2:

          bgDecor3:

          cornerDecor:
            "radial-gradient(circle at top right, rgba(66, 191, 162, 0.14), transparent 56%)",
          card: "#ffffff",
          cardSoft: "#f3fffb",
          primary: "#42bfa2",
          primaryDark: "#21937d",
          text: "#2f4b45",
          muted: "#5d7d76",
          line: "#bde7dd",
          shadow: "rgba(66, 191, 162, 0.14)",
          btnSoftBg: "#d9f4ec",
          btnSoftText: "#2d7668",
          btnSoftHover: "#c5eee3",
        },
      };

      function applyTheme(themeName) {
        const theme = themes[themeName] || themes.pink;
        const root = document.documentElement;
        root.style.setProperty("--bg", theme.bg);
        root.style.setProperty("--bg-accent", theme.bgAccent);
        root.style.setProperty("--bg-decor-1", theme.bgDecor1);
        root.style.setProperty("--bg-decor-2", theme.bgDecor2);
        root.style.setProperty("--bg-decor-3", theme.bgDecor3);
        root.style.setProperty("--corner-decor", theme.cornerDecor);
        root.style.setProperty("--card", theme.card);
        root.style.setProperty("--card-soft", theme.cardSoft);
        root.style.setProperty("--primary", theme.primary);
        root.style.setProperty("--primary-dark", theme.primaryDark);
        root.style.setProperty("--text", theme.text);
        root.style.setProperty("--muted", theme.muted);
        root.style.setProperty("--line", theme.line);
        root.style.setProperty("--shadow", theme.shadow);
        root.style.setProperty("--btn-soft-bg", theme.btnSoftBg);
        root.style.setProperty("--btn-soft-text", theme.btnSoftText);
        root.style.setProperty("--btn-soft-hover", theme.btnSoftHover);
      }

      function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}/${month}/${day}`;
      }

      function renderTodayDate() {
        todayDate.textContent = `今日日期：${formatDate(new Date())}`;
      }

      function loadTheme() {
        const savedTheme = localStorage.getItem(themeStorageKey);
        const themeName = themes[savedTheme] ? savedTheme : "pink";
        themeSelect.value = themeName;
        applyTheme(themeName);
      }

      function splitSentences(text) {
        return text
          .split(/[。！？!?.\n]/)
          .map((s) => s.trim())
          .filter(Boolean);
      }

      function getMoodKeywords(text) {
        const found = moodMap
          .filter((item) => item.words.some((word) => text.includes(word)))
          .map((item) => item.key);

        if (found.length) return found.join("、");
        return "平穩、努力、前進";
      }

      function organizeDiary(rawText) {
        const text = rawText.trim();
        if (!text) {
          return {
            fullDiary: "請先輸入今天的日記內容喔～",
            shortReport: "尚未有內容可整理。",
            quote: "今天也值得一句溫柔的鼓勵。",
            mood: "待補充",
          };
        }

        const sentences = splitSentences(text);
        const opening = sentences[0] || "今天努力地過了一天";
        const ending = sentences[sentences.length - 1] || opening;

        const shortReport = `今天重點：${opening}。\n目前進度：${ending}。\n整體來說，有在穩穩前進！`;
        const quote = `「${ending.replace(/[，,]$/, "")}，我做得到。」`;

        return {
          fullDiary: text,
          shortReport,
          quote,
          mood: getMoodKeywords(text),
        };
      }

      function getRandomEncouragement() {
        const index = Math.floor(Math.random() * encouragements.length);
        return encouragements[index];
      }

      function applyOutputs(data) {
        Object.entries(outputs).forEach(([key, el]) => {
          el.textContent = data[key] || defaultOutputs[key];
        });
      }

      function saveData() {
        const payload = {
          input: input.value,
          tomorrowNote: tomorrowNoteInput.value,
          encouragement: encouragementEl.textContent,
          outputs: Object.fromEntries(
            Object.entries(outputs).map(([key, el]) => [key, el.textContent])
          ),
        };
        localStorage.setItem(storageKey, JSON.stringify(payload));
      }

      function getCurrentThemeLabel() {
        return themeSelect.options[themeSelect.selectedIndex]?.text || "粉紅膠囊";
      }

      function buildCurrentEntry() {
        return {
          date: formatDate(new Date()),
          input: input.value.trim(),
          fullDiary: outputs.fullDiary.textContent,
          shortReport: outputs.shortReport.textContent,
          quote: outputs.quote.textContent,
          mood: outputs.mood.textContent,
          tomorrowNote: tomorrowNoteInput.value.trim() || "（尚未填寫）",
          theme: getCurrentThemeLabel(),
        };
      }

      function loadHistory() {
        const stored = localStorage.getItem(historyStorageKey);
        if (!stored) return [];
        try {
          const data = JSON.parse(stored);
          return Array.isArray(data) ? data : [];
        } catch {
          localStorage.removeItem(historyStorageKey);
          return [];
        }
      }

      function saveHistory(history) {
        localStorage.setItem(historyStorageKey, JSON.stringify(history));
      }

      function deleteHistoryEntry(index) {
        const history = loadHistory();
        history.splice(index, 1);
        saveHistory(history);
        renderHistory();
      }

      function renderHistory() {
        const history = loadHistory();
        historyList.innerHTML = "";
        historyEmpty.style.display = history.length ? "none" : "block";

        history.forEach((item, index) => {
          const details = document.createElement("details");
          const summary = document.createElement("summary");

          const summaryText = document.createElement("span");
          summaryText.className = "history-summary-text";
          summaryText.textContent = `${item.date || "未記錄日期"}｜${item.theme || "未記錄主題"}`;

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "history-delete-btn";
          deleteBtn.textContent = "刪除此篇";
          deleteBtn.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            deleteHistoryEntry(index);
          });

          const content = document.createElement("div");
          content.className = "history-item-content";
          content.textContent = [
            `【原始輸入內容】\n${item.input || "（空白）"}`,
            `【今日日記】\n${item.fullDiary || "（空白）"}`,
            `【小蝦蝦版短版回報】\n${item.shortReport || "（空白）"}`,
            `【今日金句】\n${item.quote || "（空白）"}`,
            `【今日情緒關鍵字】\n${item.mood || "（空白）"}`,
            `【明天要記得】\n${item.tomorrowNote || "（尚未填寫）"}`,
          ].join("\n\n");

          summary.appendChild(summaryText);
          summary.appendChild(deleteBtn);

          details.appendChild(summary);
          details.appendChild(content);
          historyList.appendChild(details);
        });
      }

      function addHistoryEntry(entry) {
        const history = loadHistory();
        history.unshift(entry);
        const trimmed = history.slice(0, 7);
        saveHistory(trimmed);
        renderHistory();
      }

      function buildExportText() {
        return [
          `日期：${formatDate(new Date())}`,
          `主題：${getCurrentThemeLabel()}`,
          "",
          `【今日日記】\n${outputs.fullDiary.textContent}`,
          "",
          `【小蝦蝦版短版回報】\n${outputs.shortReport.textContent}`,
          "",
          `【今日金句】\n${outputs.quote.textContent}`,
          "",
          `【今日情緒關鍵字】\n${outputs.mood.textContent}`,
          "",
          `【明天要記得】\n${tomorrowNoteInput.value.trim() || "（尚未填寫）"}`,
        ].join("\n");
      }

      function exportTxtFile() {
        const text = buildExportText();
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `dan-dan-${formatDate(new Date()).replaceAll("/", "-")}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      function loadData() {
        const stored = localStorage.getItem(storageKey);
        if (!stored) return;

        try {
          const data = JSON.parse(stored);
          input.value = data.input || "";
          tomorrowNoteInput.value = data.tomorrowNote || "";
          encouragementEl.textContent = data.encouragement || defaultEncouragement;
          applyOutputs(data.outputs || {});
        } catch {
          localStorage.removeItem(storageKey);
        }
      }

      organizeBtn.addEventListener("click", () => {
        const result = organizeDiary(input.value);
        applyOutputs(result);
        encouragementEl.textContent = getRandomEncouragement();
        saveData();

        if (input.value.trim()) {
          addHistoryEntry(buildCurrentEntry());
        }
      });

      exportTxtBtn.addEventListener("click", () => {
        exportTxtFile();
      });

      document.querySelectorAll(".mood-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const moodText = btn.dataset.mood || "";
          outputs.mood.textContent = moodText;
          saveData();
        });
      });

      input.addEventListener("input", saveData);
      tomorrowNoteInput.addEventListener("input", saveData);

      clearBtn.addEventListener("click", () => {
        input.value = "";
        tomorrowNoteInput.value = "";
        applyOutputs(defaultOutputs);
        encouragementEl.textContent = defaultEncouragement;
        localStorage.removeItem(storageKey);
      });

      copyAllBtn.addEventListener("click", async () => {
        const message = [
          `📅 日期：${formatDate(new Date())}`,
          "",
          `【今日日記】\n${outputs.fullDiary.textContent}`,
          "",
          `【小蝦蝦版短版回報】\n${outputs.shortReport.textContent}`,
          "",
          `【今日金句】\n${outputs.quote.textContent}`,
          "",
          `【今日情緒關鍵字】\n${outputs.mood.textContent}`,
          "",
          `【明天要記得】\n${tomorrowNoteInput.value.trim() || "（尚未填寫）"}`,
        ].join("\n");

        try {
          await navigator.clipboard.writeText(message);
          const oldText = copyAllBtn.textContent;
          copyAllBtn.textContent = "全部已複製！";
          setTimeout(() => {
            copyAllBtn.textContent = oldText;
          }, 1200);
        } catch {
          alert("複製失敗，請手動複製文字。\n\n" + message);
        }
      });

      themeSelect.addEventListener("change", () => {
        const selected = themeSelect.value;
        applyTheme(selected);
        localStorage.setItem(themeStorageKey, selected);
      });

      jetBtn.addEventListener("click", () => {
        const randomEmoji = jetEmojis[Math.floor(Math.random() * jetEmojis.length)];
        jetOutput.textContent = randomEmoji;
        jetOutput.classList.add("show");
        if (jetTimer) clearTimeout(jetTimer);
        jetTimer = setTimeout(() => {
          jetOutput.classList.remove("show");
          jetTimer = null;
        }, 1800);
      });

      document.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const key = btn.dataset.copy;
          const text = outputs[key].textContent;
          try {
            await navigator.clipboard.writeText(text);
            const oldText = btn.textContent;
            btn.textContent = "已複製！";
            setTimeout(() => {
              btn.textContent = oldText;
            }, 1000);
          } catch {
            alert("複製失敗，請手動複製文字。");
          }
        });
      });

      renderTodayDate();
      loadTheme();
      loadData();
      renderHistory();
    </script>
  </body>
</html>
