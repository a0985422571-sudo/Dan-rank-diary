<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>排位降溫日記</title>
    <style>
      :root {
        --bg: #fff8fc;
        --bg-accent: #ffeaf5;
        --bg-decor-1: radial-gradient(circle at 8% 18%, rgba(255, 147, 196, 0.16) 0, rgba(255, 147, 196, 0.16) 9px, transparent 10px);
        --bg-decor-2: radial-gradient(circle at 92% 84%, rgba(255, 255, 255, 0.65) 0, rgba(255, 255, 255, 0.65) 6px, transparent 7px);
        --bg-decor-3: radial-gradient(circle at 82% 16%, rgba(255, 188, 221, 0.2) 0, rgba(255, 188, 221, 0.2) 10px, transparent 11px);
        --corner-decor: radial-gradient(circle at top right, rgba(255, 171, 211, 0.24), transparent 56%);
        --card: #ffffff;
        --card-soft: #fffcfe;
        --primary: #ff7eb6;
        --primary-dark: #ff5da6;
        --text: #4b3e4d;
        --muted: #8f7b8f;
        --line: #f7d5e7;
        --shadow: rgba(255, 126, 182, 0.14);
        --btn-soft-bg: #ffe2f0;
        --btn-soft-text: #9e3e71;
        --btn-soft-hover: #ffd0e6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background:
          var(--bg-decor-1),
          var(--bg-decor-2),
          var(--bg-decor-3),
          radial-gradient(circle at top, var(--bg-accent), var(--bg));
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        padding: 16px;
      }

      .app {
        position: relative;
        width: min(920px, 100%);
        margin: 0 auto;
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 8px 24px var(--shadow);
        padding: 16px;
      }

      .app::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: var(--corner-decor);
        opacity: 0.9;
        border-radius: 18px;
      }

      .app-head,
      .row,
      .btn-row,
      .quick-row,
      .template-row,
      .counter-row,
      .history-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .app-head {
        justify-content: space-between;
        align-items: center;
      }

      h1 {
        margin: 0;
        color: var(--primary-dark);
        font-size: clamp(1.4rem, 1.1rem + 1.5vw, 2rem);
      }

      .subtitle,
      .hint,
      .status-line,
      .label {
        color: var(--muted);
      }

      .subtitle {
        margin: 6px 0 12px;
      }

      .panel {
        border: 2px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: var(--card-soft);
        margin-top: 12px;
      }

      .label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.92rem;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 2px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: #fff;
        color: var(--text);
      }

      textarea {
        min-height: 130px;
        resize: vertical;
        line-height: 1.6;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 26%, transparent);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
        min-height: 42px;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .primary-btn {
        background: var(--primary);
        color: #fff;
      }

      .primary-btn:hover {
        background: var(--primary-dark);
      }

      .soft-btn,
      .tag-btn,
      .theme-select,
      .date-input {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
      }

      .soft-btn:hover,
      .tag-btn:hover {
        background: var(--btn-soft-hover);
      }

      .grow {
        flex: 1 1 220px;
      }

      .status-line {
        margin-top: 8px;
        font-size: 0.9rem;
      }

      .template-row button,
      .quick-row button,
      .counter-row button,
      .history-actions button {
        padding: 8px 12px;
        font-size: 0.92rem;
      }

      .mood-chip {
        border: 2px solid var(--line);
        background: #fff;
        color: var(--text);
      }

      .mood-chip.active {
        background: var(--btn-soft-bg);
        border-color: color-mix(in srgb, var(--line) 40%, var(--primary) 60%);
      }

      .rage-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
      }

      .rage-value {
        font-weight: 700;
        color: var(--primary-dark);
      }

      .jet-wrap {
        position: relative;
        min-height: 54px;
        align-items: center;
      }

      .jet-output {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .jet-burst {
        position: absolute;
        left: var(--start-x, 56px);
        top: var(--start-y, 12px);
        font-size: clamp(1.5rem, 1.1rem + 1vw, 1.9rem);
        line-height: 1;
        will-change: transform, opacity;
        animation: jet-rise var(--duration, 1.4s) ease-out forwards;
      }

      @keyframes jet-rise {
        0% {
          opacity: 0;
          transform: translate(0, 0) scale(0.86);
        }
        12% {
          opacity: 1;
          transform: translate(-1px, -7px) scale(1.04);
        }
        100% {
          opacity: 0;
          transform: translate(var(--drift-x, 0px), -52px) scale(1.2);
        }
      }

      .history {
        margin-top: 14px;
      }

      .history-list {
        display: grid;
        gap: 10px;
        margin-top: 8px;
      }

      .history-item {
        border: 2px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 10px;
      }

      .history-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .history-summary {
        margin: 8px 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .history-full {
        white-space: pre-wrap;
        line-height: 1.58;
        border-top: 1px dashed var(--line);
        margin-top: 8px;
        padding-top: 8px;
        display: none;
      }

      .history-item.open .history-full {
        display: block;
      }

      .toast-wrap {
        position: fixed;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        z-index: 30;
        width: min(90vw, 480px);
        pointer-events: none;
      }

      .toast {
        background: color-mix(in srgb, var(--card) 82%, var(--primary) 18%);
        border: 2px solid var(--line);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        text-align: center;
        box-shadow: 0 6px 18px var(--shadow);
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (min-width: 720px) {
        body {
          padding: 24px;
        }

        .app {
          padding: 24px;
        }

        .two-col {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  </head>
  <body>
    <main class="app">
      <div class="app-head">
        <div>
          <h1>🔥 排位降溫日記</h1>
          <p class="subtitle">紅溫先記下來，再決定要不要繼續排。</p>
        </div>
        <div class="grow">
          <label class="label" for="themeSelect">主題模式</label>
          <select id="themeSelect" class="theme-select">
            <option value="pink">粉紅膠囊</option>
            <option value="starry">星空色</option>
            <option value="matcha">抹茶拿鐵</option>
            <option value="sunset">夕陽橘</option>
            <option value="falconWatch">侏儒獵鷹觀察模式</option>
            <option value="starCookie">星餅乾宇宙</option>
            <option value="mintSoda">薄荷汽水</option>
          </select>
        </div>
      </div>

      <section class="panel" id="diaryCard">
        <div class="row">
          <div class="grow">
            <label class="label" for="entryDate">日期</label>
            <input id="entryDate" class="date-input" type="date" />
          </div>
          <div class="grow">
            <label class="label" for="openerInput">先噴一句</label>
            <input id="openerInput" placeholder="例：🙄 我已經懶得生氣了" />
          </div>
        </div>

        <div class="panel" style="margin-top: 10px">
          <span class="label">主日記模板（和快速填入分開）</span>
          <div class="template-row" id="templateButtons"></div>
        </div>

        <div class="panel" style="margin-top: 10px">
          <span class="label">快速填入（一鍵發瘋）</span>
          <div class="quick-row" id="quickFillButtons"></div>
        </div>

        <label class="label" for="diaryInput" style="margin-top: 12px">主日記</label>
        <textarea id="diaryInput" placeholder="把剛剛那場到底發生什麼事，直接丟進來。"></textarea>

        <div class="two-col" style="margin-top: 10px">
          <div>
            <label class="label" for="closingInput">收尾句</label>
            <input id="closingInput" placeholder="例：今天先活下來就好" />
          </div>
          <div>
            <label class="label">紅溫值</label>
            <div class="rage-row">
              <input id="rageInput" type="range" min="0" max="100" value="50" />
              <span id="rageValue" class="rage-value">50</span>
            </div>
          </div>
        </div>

        <div style="margin-top: 12px">
          <span class="label">心情標籤</span>
          <div class="quick-row" id="moodChips"></div>
        </div>

        <div class="panel" style="margin-top: 12px">
          <div class="row" style="justify-content: space-between; align-items: center">
            <span class="label" style="margin: 0">噴射計數</span>
            <span class="hint" id="jetStats">💩 0 次 ｜ 🙄💅 0 次</span>
          </div>
          <div class="counter-row" style="margin-top: 8px">
            <button class="soft-btn" id="poopBtn" type="button">💩 +1</button>
            <button class="soft-btn" id="eyeRollBtn" type="button">🙄💅 +1</button>
            <button class="soft-btn" id="resetJetBtn" type="button">重置噴射</button>
          </div>
          <div class="jet-wrap row" style="margin-top: 8px">
            <button class="soft-btn" id="jetBtn" type="button">今日噴射</button>
            <div class="jet-output" id="jetOutput" aria-hidden="true"></div>
          </div>
        </div>

        <p class="status-line" id="draftStatus">草稿狀態：尚未載入</p>

        <div class="btn-row" style="margin-top: 10px">
          <button class="primary-btn" id="saveRecordBtn" type="button">存成今天紀錄</button>
          <button class="soft-btn" id="exportBtn" type="button">匯出文字</button>
          <button class="soft-btn" id="copyExportBtn" type="button">一鍵複製文字</button>
          <button class="soft-btn" id="screenshotBtn" type="button">截圖分享</button>
          <button class="soft-btn" id="clearDraftBtn" type="button">清空此日草稿</button>
        </div>
      </section>

      <section class="panel history" id="historySection">
        <div class="history-top">
          <h2 style="margin: 0; color: var(--primary-dark); font-size: 1.06rem">🗂️ 歷史紀錄</h2>
          <div class="history-actions">
            <button class="soft-btn" id="clearHistoryBtn" type="button">清空全部歷史</button>
          </div>
        </div>
        <p class="hint" id="historyEmpty">目前還沒有正式存檔，先存一筆吧。</p>
        <div class="history-list" id="historyList"></div>
      </section>
    </main>

    <div class="toast-wrap" aria-live="polite" aria-atomic="true">
      <div class="toast" id="toast"></div>
    </div>

        falconWatch: { bg: "#f6f8ff", bgAccent: "#e3ebff", bgDecor1: "radial-gradient(circle at 9% 18%, rgba(117, 147, 224, 0.16) 0, rgba(117, 147, 224, 0.16) 8px, transparent 9px)", bgDecor2: "radial-gradient(circle at 88% 84%, rgba(181, 204, 255, 0.2) 0, rgba(181, 204, 255, 0.2) 10px, transparent 11px)", bgDecor3: "radial-gradient(circle at 79% 15%, rgba(143, 177, 255, 0.19) 0, rgba(143, 177, 255, 0.19) 10px, transparent 11px)", cornerDecor: "radial-gradient(circle at top right, rgba(139, 168, 238, 0.22), transparent 56%)", card: "#ffffff", cardSoft: "#f3f7ff", primary: "#5f84db", primaryDark: "#4369c4", text: "#2f3f63", muted: "#62729a", line: "#cfdbf4", shadow: "rgba(88, 114, 191, 0.16)", btnSoftBg: "#e5eeff", btnSoftText: "#3f5ea9", btnSoftHover: "#d5e4ff" },
        starCookie: { bg: "#fffaf0", bgAccent: "#fce8c6", bgDecor1: "radial-gradient(circle at 8% 18%, rgba(255, 198, 113, 0.2) 0, rgba(255, 198, 113, 0.2) 8px, transparent 9px)", bgDecor2: "radial-gradient(circle at 90% 83%, rgba(255, 231, 164, 0.26) 0, rgba(255, 231, 164, 0.26) 10px, transparent 11px)", bgDecor3: "radial-gradient(circle at 80% 14%, rgba(255, 188, 87, 0.2) 0, rgba(255, 188, 87, 0.2) 11px, transparent 12px)", cornerDecor: "radial-gradient(circle at top right, rgba(255, 205, 128, 0.24), transparent 56%)", card: "#fffef9", cardSoft: "#fff9ed", primary: "#d79134", primaryDark: "#bb7521", text: "#5f4b2d", muted: "#90754f", line: "#f1d9af", shadow: "rgba(211, 159, 73, 0.18)", btnSoftBg: "#ffefcf", btnSoftText: "#8c6028", btnSoftHover: "#ffe4b4" },
        mintSoda: { bg: "#effffc", bgAccent: "#d8f8f1", bgDecor1: "radial-gradient(circle at 9% 18%, rgba(102, 210, 195, 0.17) 0, rgba(102, 210, 195, 0.17) 8px, transparent 9px)", bgDecor2: "radial-gradient(circle at 90% 84%, rgba(150, 233, 221, 0.22) 0, rgba(150, 233, 221, 0.22) 10px, transparent 11px)", bgDecor3: "radial-gradient(circle at 82% 15%, rgba(100, 201, 218, 0.18) 0, rgba(100, 201, 218, 0.18) 10px, transparent 11px)", cornerDecor: "radial-gradient(circle at top right, rgba(126, 224, 211, 0.24), transparent 56%)", card: "#ffffff", cardSoft: "#f4fffd", primary: "#36b8a8", primaryDark: "#20998b", text: "#2e4e4a", muted: "#5f847f", line: "#c8ece5", shadow: "rgba(56, 177, 162, 0.16)", btnSoftBg: "#dcf8f3", btnSoftText: "#2c7f75", btnSoftHover: "#c7f1e9" },
      };

      let draftToastTimer = null;

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(draftToastTimer);
        draftToastTimer = setTimeout(() => toast.classList.remove("show"), 2000);
      }

      function getTodayISO() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
      }

      function formatDateSlash(isoDate) {
        if (!isoDate) return "----/--/--";
        const [y, m, d] = isoDate.split("-");
        return `${y}/${m}/${d}`;
      }

      function formatSavedAt(date = new Date()) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        const hh = String(date.getHours()).padStart(2, "0");
        const mm = String(date.getMinutes()).padStart(2, "0");
        const ss = String(date.getSeconds()).padStart(2, "0");
        return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
      }

      function loadJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function saveJSON(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function applyTheme(themeName) {
        const theme = themes[themeName] || themes.pink;
        const root = document.documentElement;
        root.style.setProperty("--bg", theme.bg);
        root.style.setProperty("--bg-accent", theme.bgAccent);
        root.style.setProperty("--bg-decor-1", theme.bgDecor1);
        root.style.setProperty("--bg-decor-2", theme.bgDecor2);
        root.style.setProperty("--bg-decor-3", theme.bgDecor3);
        root.style.setProperty("--corner-decor", theme.cornerDecor);
        root.style.setProperty("--card", theme.card);
        root.style.setProperty("--card-soft", theme.cardSoft);
        root.style.setProperty("--primary", theme.primary);
        root.style.setProperty("--primary-dark", theme.primaryDark);
        root.style.setProperty("--text", theme.text);
        root.style.setProperty("--muted", theme.muted);
        root.style.setProperty("--line", theme.line);
        root.style.setProperty("--shadow", theme.shadow);
        root.style.setProperty("--btn-soft-bg", theme.btnSoftBg);
        root.style.setProperty("--btn-soft-text", theme.btnSoftText);
        root.style.setProperty("--btn-soft-hover", theme.btnSoftHover);
      }

      // 將表單組成草稿資料（綁日期）
      function collectDraft() {
        return {
          opener: openerInput.value.trim(),
          diary: diaryInput.value.trim(),
          closing: closingInput.value.trim(),
          rageValue: Number(rageInput.value),
          moods: [...currentState.moods],
          poopCount: currentState.poopCount,
          eyeRollCount: currentState.eyeRollCount,
          theme: themeSelect.value,
        };
      }

      function applyDraft(draft) {
        openerInput.value = draft?.opener || "";
        diaryInput.value = draft?.diary || "";
        closingInput.value = draft?.closing || "";
        rageInput.value = String(draft?.rageValue ?? 50);
        rageValue.textContent = rageInput.value;
        currentState.moods = Array.isArray(draft?.moods) ? draft.moods : [];
        currentState.poopCount = Number(draft?.poopCount || 0);
        currentState.eyeRollCount = Number(draft?.eyeRollCount || 0);
        renderMoodChips();
        renderJetStats();
      }

      function getDraftsByDate() {
        return loadJSON(KEY_DRAFTS_BY_DATE, {});
      }

      function saveDraftForCurrentDate(showStatusToast = false) {
        const dateKey = entryDate.value;
        if (!dateKey) return;
        const draftsByDate = getDraftsByDate();
        draftsByDate[dateKey] = collectDraft();
        saveJSON(KEY_DRAFTS_BY_DATE, draftsByDate);
        draftStatus.textContent = `草稿狀態：${formatDateSlash(dateKey)} 草稿已自動儲存`;
        if (showStatusToast) showToast("已自動儲存草稿");
      }

      function loadDraftByDate(dateKey, toastIt = true) {
        const draftsByDate = getDraftsByDate();
        const draft = draftsByDate[dateKey];
        if (draft) {
          applyDraft(draft);
          draftStatus.textContent = `草稿狀態：已載入 ${formatDateSlash(dateKey)} 的草稿`;
          if (draft.theme && themes[draft.theme]) {
            themeSelect.value = draft.theme;
            applyTheme(draft.theme);
            localStorage.setItem(KEY_THEME, draft.theme);
          }
          if (toastIt) showToast(`已載入 ${formatDateSlash(dateKey)} 的草稿`);
        } else {
          applyDraft(null);
          draftStatus.textContent = `草稿狀態：${formatDateSlash(dateKey)} 目前沒有草稿`;
        }
      }

      function getThemeLabel() {
        return themeSelect.options[themeSelect.selectedIndex]?.text || themeSelect.value;
      }

      function generateExportText(source) {
        return [
          `日期：${formatDateSlash(source.date)}`,
          `主題：${source.themeLabel}`,
          `紅溫值：${source.rageValue}`,
          `先噴一句：${source.opener || "（未填寫）"}`,
          "主日記：",
          source.diary || "（未填寫）",
          "心情：",
          source.moods.length ? source.moods.join("、") : "（未選擇）",
          `💩噴射：${source.poopCount} 次`,
          `🙄💅噴射：${source.eyeRollCount} 次`,
          "收尾：",
          source.closing || "（未填寫）",
        ].join("\n");
      }

      function currentExportSource() {
        return {
          date: entryDate.value,
          theme: themeSelect.value,
          themeLabel: getThemeLabel(),
          rageValue: Number(rageInput.value),
          opener: openerInput.value.trim(),
          diary: diaryInput.value.trim(),
          moods: [...currentState.moods],
          poopCount: currentState.poopCount,
          eyeRollCount: currentState.eyeRollCount,
          closing: closingInput.value.trim(),
        };
      }

      function getHistory() {
        return loadJSON(KEY_HISTORY, []);
      }

      function saveHistory(records) {
        saveJSON(KEY_HISTORY, records);
      }

      function saveRecord() {
        const source = currentExportSource();
        const newRecord = {
          id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          date: source.date,
          savedAt: formatSavedAt(),
          theme: source.theme,
          themeLabel: source.themeLabel,
          rageValue: source.rageValue,
          opener: source.opener,
          diary: source.diary,
          moods: source.moods,
          poopCount: source.poopCount,
          eyeRollCount: source.eyeRollCount,
          closing: source.closing,
        };

        const records = getHistory();
        records.unshift(newRecord);
        saveHistory(records);
        renderHistory();
        showToast("存檔成功，已加入歷史紀錄");
      }

      function renderHistory() {
        const records = getHistory();
        historyList.innerHTML = "";
        historyEmpty.style.display = records.length ? "none" : "block";

        records.forEach((record) => {
          const item = document.createElement("article");
          item.className = "history-item";

          const title = `${formatDateSlash(record.date)} ｜ ${record.savedAt}`;
          const summary = (record.diary || "（無日記內容）").slice(0, 48);

          item.innerHTML = `
            <div class="history-top">
              <strong>${title}</strong>
              <span class="hint">${record.themeLabel || record.theme}</span>
            </div>
            <p class="history-summary">${summary}${(record.diary || "").length > 48 ? "..." : ""}</p>
            <div class="quick-row">
              <button class="soft-btn" data-action="toggle">展開內容</button>
              <button class="soft-btn" data-action="load">載入這筆</button>
              <button class="soft-btn" data-action="delete">刪除</button>
            </div>
            <div class="history-full">${generateExportText({
              date: record.date,
              themeLabel: record.themeLabel || record.theme,
              rageValue: record.rageValue,
              opener: record.opener,
              diary: record.diary,
              moods: record.moods || [],
              poopCount: record.poopCount || 0,
              eyeRollCount: record.eyeRollCount || 0,
              closing: record.closing,
            })}</div>
          `;

          item.querySelector('[data-action="toggle"]').addEventListener("click", () => {
            const isOpen = item.classList.toggle("open");
            item.querySelector('[data-action="toggle"]').textContent = isOpen ? "收起內容" : "展開內容";
          });

          item.querySelector('[data-action="load"]').addEventListener("click", () => {
            entryDate.value = record.date;
            openerInput.value = record.opener || "";
            diaryInput.value = record.diary || "";
            closingInput.value = record.closing || "";
            rageInput.value = String(record.rageValue ?? 50);
            rageValue.textContent = rageInput.value;
            currentState.moods = Array.isArray(record.moods) ? [...record.moods] : [];
            currentState.poopCount = Number(record.poopCount || 0);
            currentState.eyeRollCount = Number(record.eyeRollCount || 0);
            renderMoodChips();
            renderJetStats();
            if (record.theme && themes[record.theme]) {
              themeSelect.value = record.theme;
              applyTheme(record.theme);
              localStorage.setItem(KEY_THEME, record.theme);
            }
            saveDraftForCurrentDate(false);
            showToast("已載入這筆紀錄到表單");
          });

          item.querySelector('[data-action="delete"]').addEventListener("click", () => {
            const recordsNow = getHistory().filter((x) => x.id !== record.id);
            saveHistory(recordsNow);
            renderHistory();
            showToast("已刪除這筆紀錄");
          });

          historyList.appendChild(item);
        });
      }

      function renderMoodChips() {
        moodChips.innerHTML = "";
        moodOptions.forEach((mood) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `tag-btn mood-chip${currentState.moods.includes(mood) ? " active" : ""}`;
          btn.textContent = mood;
          btn.addEventListener("click", () => {
            if (currentState.moods.includes(mood)) {
              currentState.moods = currentState.moods.filter((m) => m !== mood);
            } else {
              currentState.moods.push(mood);
            }
            renderMoodChips();
            saveDraftForCurrentDate();
          });
          moodChips.appendChild(btn);
        });
      }

      function renderTemplateButtons() {
        templateButtons.innerHTML = "";
        templates.forEach((tpl) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "soft-btn";
          btn.textContent = tpl.name;
          btn.addEventListener("click", () => {
            const hasText = diaryInput.value.trim().length > 0;
            if (hasText && !window.confirm("主日記已有內容，要覆蓋成模板嗎？")) return;
            diaryInput.value = tpl.text;
            saveDraftForCurrentDate();
            showToast(`已套用模板：${tpl.name}`);
          });
          templateButtons.appendChild(btn);
        });
      }

      function renderQuickFillButtons() {
        quickFillButtons.innerHTML = "";
        quickFillOptions.forEach((text, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "soft-btn";
          btn.textContent = `一鍵發瘋 ${idx + 1}`;
          btn.addEventListener("click", () => {
            diaryInput.value = text;
            saveDraftForCurrentDate();
            showToast("已快速填入主日記");
          });
          quickFillButtons.appendChild(btn);
        });
      }

      function renderJetStats() {
        jetStats.textContent = `💩 ${currentState.poopCount} 次 ｜ 🙄💅 ${currentState.eyeRollCount} 次`;
      }

      function emitJetEmoji() {
        const randomEmoji = jetEmojis[Math.floor(Math.random() * jetEmojis.length)];
        const burst = document.createElement("span");
        const duration = 1200 + Math.random() * 600;
        const offsetX = -14 + Math.random() * 28;
        const offsetY = 8 + Math.random() * 16;
        const driftX = -18 + Math.random() * 36;

        burst.className = "jet-burst";
        burst.textContent = randomEmoji;
        burst.style.setProperty("--start-x", `calc(56px + ${offsetX}px)`);
        burst.style.setProperty("--start-y", `${offsetY}px`);
        burst.style.setProperty("--drift-x", `${driftX}px`);
        burst.style.setProperty("--duration", `${duration}ms`);
        jetOutput.appendChild(burst);
        setTimeout(() => burst.remove(), duration + 120);
      }

      async function copyExportText() {
        const text = generateExportText(currentExportSource());
        try {
          await navigator.clipboard.writeText(text);
          showToast("匯出成功，已複製到剪貼簿");
        } catch {
          showToast("複製失敗，請改用下載 txt");
        }
      }

      function downloadExportText() {
        const source = currentExportSource();
        const text = generateExportText(source);
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const fileName = `排位降溫日記_${source.date || "未命名"}.txt`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
        showToast("匯出成功（txt 已下載）");
      }

      async function screenshotShare() {
        const card = document.getElementById("diaryCard");
        if (!window.html2canvas) {
          showToast("截圖套件尚未載入，請稍後再試");
          return;
        }

        const canvas = await window.html2canvas(card, {
          scale: Math.min(window.devicePixelRatio || 1.5, 2),
          backgroundColor: null,
          useCORS: true,
        });

        const pngBlob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        if (!pngBlob) {
          showToast("截圖失敗，請重試");
          return;
        }

        const file = new File([pngBlob], "排位降溫日記.png", { type: "image/png" });
        const canShareFile = navigator.share && navigator.canShare && navigator.canShare({ files: [file] });

        if (canShareFile) {
          try {
            await navigator.share({
              title: "排位降溫日記",
              text: "我先降溫，再決定要不要繼續排。",
              files: [file],
            });
            showToast("分享成功");
            return;
          } catch {
            // 使用者取消也會進來，改走下載 fallback
          }
        }

        const url = URL.createObjectURL(pngBlob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "排位降溫日記.png";
        a.click();
        URL.revokeObjectURL(url);
        showToast("已下載 PNG（可直接分享）");
      }

      function clearCurrentDateDraft() {
        const dateKey = entryDate.value;
        if (!dateKey) return;
        const draftsByDate = getDraftsByDate();
        delete draftsByDate[dateKey];
        saveJSON(KEY_DRAFTS_BY_DATE, draftsByDate);
        applyDraft(null);
        draftStatus.textContent = `草稿狀態：${formatDateSlash(dateKey)} 草稿已清空`;
        showToast("已清空此日草稿");
      }

      // ===== 事件綁定 =====
      themeSelect.addEventListener("change", () => {
        applyTheme(themeSelect.value);
        localStorage.setItem(KEY_THEME, themeSelect.value);
        saveDraftForCurrentDate();
      });

      entryDate.addEventListener("change", () => loadDraftByDate(entryDate.value));
      [openerInput, diaryInput, closingInput, rageInput].forEach((el) => {
        el.addEventListener("input", () => {
          rageValue.textContent = rageInput.value;
          saveDraftForCurrentDate();
        });
      });

      poopBtn.addEventListener("click", () => {
        currentState.poopCount += 1;
        renderJetStats();
        saveDraftForCurrentDate();
      });

      eyeRollBtn.addEventListener("click", () => {
        currentState.eyeRollCount += 1;
        renderJetStats();
        saveDraftForCurrentDate();
      });

      resetJetBtn.addEventListener("click", () => {
        currentState.poopCount = 0;
        currentState.eyeRollCount = 0;
        renderJetStats();
        saveDraftForCurrentDate();
        showToast("噴射計數已重置");
      });

      jetBtn.addEventListener("click", emitJetEmoji);
      saveRecordBtn.addEventListener("click", saveRecord);
      exportBtn.addEventListener("click", downloadExportText);
      copyExportBtn.addEventListener("click", copyExportText);
      screenshotBtn.addEventListener("click", screenshotShare);
      clearDraftBtn.addEventListener("click", clearCurrentDateDraft);

      clearHistoryBtn.addEventListener("click", () => {
        if (!window.confirm("確定要清空全部歷史紀錄嗎？此動作無法復原。")) return;
        saveHistory([]);
        renderHistory();
        showToast("全部歷史紀錄已清空");
      });

      // ===== 初始化 =====
      function init() {
        renderTemplateButtons();
        renderQuickFillButtons();
        renderMoodChips();
        renderJetStats();

        const savedTheme = localStorage.getItem(KEY_THEME);
        themeSelect.value = themes[savedTheme] ? savedTheme : "pink";
        applyTheme(themeSelect.value);

        entryDate.value = getTodayISO();
        loadDraftByDate(entryDate.value, false);
        renderHistory();
      }

      init();
    </script>
  </body>
</html>
