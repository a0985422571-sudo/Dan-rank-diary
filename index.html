<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第五人格排位降溫日記</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="rage">
    <div class="corner-stickers" aria-hidden="true">
      <span id="stickerLeft">😡</span>
      <span id="stickerRight">🔥</span>
    </div>

    <main class="container">
      <header class="card header-card">
        <div>
          <p class="small-text">私人發瘋用，不連網不上傳</p>
          <h1 id="themeTitle">本日紅溫紀錄</h1>
          <p id="themeSubtitle">先發洩，再冷靜，今天先別怪自己。</p>
        </div>
        <div id="themeButtons" class="theme-buttons"></div>
      </header>

      <section class="card">
        <h2>📝 今天排位日記</h2>
        <div class="grid two-col">
          <label>
            <span>日期</span>
            <input id="diaryDate" type="date" />
          </label>
          <label>
            <span>我現在心情</span>
            <input id="mood" type="text" placeholder="例如：火大、委屈、戀愛腦、社死" />
          </label>
          <label>
            <span>今天最雷的是誰 / 什麼事</span>
            <input id="worst" type="text" placeholder="例如：雙倒硬救、我自己空刀" />
          </label>
          <label>
            <span>打完這篇後有比較冷靜嗎？</span>
            <select id="calmLevel">
              <option value="有">有，舒服很多</option>
              <option value="一點點">一點點，還在冒煙</option>
              <option value="沒有">沒有，我還是火山</option>
            </select>
          </label>
        </div>

        <label>
          <span>今天發生什麼事（情緒垃圾桶）</span>
          <textarea id="story" placeholder="想罵就罵、想哭就哭，這格是你的安全區。"></textarea>
        </label>

        <div class="meter-wrap">
          <label for="rageMeter">今日紅溫值：<strong id="rageValue">55</strong>/100</label>
          <input id="rageMeter" type="range" min="0" max="100" value="55" />
        </div>

        <div class="row">
          <button id="saveBtn" class="btn btn-primary">💾 儲存今天紀錄</button>
          <button id="clearBtn" class="btn btn-soft">🧹 清空今天紀錄</button>
          <p id="calmHint" class="small-text">先把情緒倒出來，慢慢就會冷。</p>
        </div>
      </section>

      <section class="card">
        <h2>🔘 發洩按鈕區</h2>
        <div class="row">
          <button id="poopBtn" class="btn btn-poop">💩 大便噴射</button>
          <button id="eyeBtn" class="btn btn-eye">🙄💅 噴射按鈕</button>
        </div>
        <div class="counter">
          <p>今日 💩：<strong id="poopCount">0</strong> 次</p>
          <p>今日 🙄💅：<strong id="eyeCount">0</strong> 次</p>
        </div>
        <div id="burstArea" class="burst-area" aria-hidden="true"></div>
      </section>

      <section class="card">
        <h2>🎯 超小廢舒壓小遊戲：射擊雷包隊友</h2>
        <div class="row">
          <p>剩餘：<span id="gameTime">12</span>s</p>
          <p>命中：<span id="gameScore">0</span></p>
          <button id="startGameBtn" class="btn">開始發洩</button>
        </div>
        <div id="gameArea" class="game-area">
          <button id="target" class="target" hidden>🤡 雷包</button>
          <p id="gameMsg" class="small-text">按「開始發洩」後，12 秒內狂點雷包。</p>
        </div>
      </section>

      <section class="card">
        <h2>👗 換裝同人遊戲（骨架版）</h2>
        <div class="dressup-layout">
          <div class="avatar" id="avatar">
            <div class="layer base">底圖角色</div>
            <div class="layer hair" id="hairLayer">髮型 A</div>
            <div class="layer cloth" id="clothLayer">衣服 A</div>
            <div class="layer acc" id="accLayer">配件 A</div>
            <div class="layer face" id="faceLayer">表情 A</div>
          </div>
          <div id="dressupControls" class="dressup-controls"></div>
        </div>
        <p class="small-text">
          註：這是素材 placeholder。之後你可在 <code>script.js</code> 的 <code>DRESSUP_OPTIONS</code> 替換成自己的圖層名稱或圖片路徑。
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
