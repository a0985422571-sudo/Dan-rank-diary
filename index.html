<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dan Dan 日記整理器</title>
    <style>
      :root {
        --bg: #fff8fc;
        --bg-accent: #ffeaf5;
        --card: #ffffff;
        --card-soft: #fffcfe;
        --primary: #ff7eb6;
        --primary-dark: #ff5da6;
        --text: #4b3e4d;
        --muted: #8f7b8f;
        --line: #f7d5e7;
        --shadow: rgba(255, 126, 182, 0.14);
        --btn-soft-bg: #ffe2f0;
        --btn-soft-text: #9e3e71;
        --btn-soft-hover: #ffd0e6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: radial-gradient(circle at top, var(--bg-accent), var(--bg));
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app {
        width: min(920px, 100%);
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 8px 24px var(--shadow);
        padding: 24px;
      }

      .app-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .title-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .today-date {
        font-size: 0.92rem;
        color: var(--muted);
      }

      .theme-select {
        border: 2px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        color: var(--text);
        background: var(--card);
        font-size: 0.92rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2vw + 1rem, 2.1rem);
        color: var(--primary-dark);
      }

      .subtitle {
        margin: 8px 0 20px;
        color: var(--muted);
      }

      textarea {
        width: 100%;
        min-height: 220px;
        padding: 14px;
        border-radius: 14px;
        border: 2px solid var(--line);
        resize: vertical;
        font-size: 1rem;
        line-height: 1.7;
        color: var(--text);
      }

      .controls {
        display: flex;
        gap: 12px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .mood-helper {
        margin-top: 14px;
      }

      .mood-helper-title {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .mood-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .mood-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
        font-weight: 600;
        padding: 8px 12px;
      }

      .mood-btn:hover {
        background: var(--btn-soft-hover);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        font-size: 0.96rem;
        font-weight: 700;
        cursor: pointer;
      }

      .organize-btn {
        background: var(--primary);
        color: #fff;
      }

      .organize-btn:hover {
        background: var(--primary-dark);
      }

      .clear-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
      }

      .clear-btn:hover {
        background: var(--btn-soft-hover);
      }

      .copy-all-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
      }

      .copy-all-btn:hover {
        background: var(--btn-soft-hover);
      }

      .tomorrow-wrap {
        margin-top: 14px;
      }

      .tomorrow-wrap label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      #tomorrowNoteInput {
        min-height: 100px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-top: 22px;
      }

      .card {
        border: 2px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        background: var(--card-soft);
      }

      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .card h2 {
        margin: 0;
        font-size: 1rem;
        color: var(--primary-dark);
      }

      .copy-btn {
        background: var(--btn-soft-bg);
        color: var(--btn-soft-text);
        font-size: 0.85rem;
        padding: 6px 12px;
      }

      .copy-btn:hover {
        background: var(--btn-soft-hover);
      }

      .output {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.7;
        min-height: 64px;
      }

      .hint {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .encouragement {
        margin-top: 12px;
        padding: 10px 14px;
        border: 2px dashed var(--line);
        border-radius: 12px;
        background: var(--card-soft);
        color: var(--muted);
        font-size: 0.93rem;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="app-head">
        <div class="title-wrap">
          <h1>✨ Dan Dan 日記整理器</h1>
          <span class="today-date" id="todayDate">今日日期：----</span>
        </div>
        <label>
          <span style="font-size: 0.9rem; color: var(--muted); margin-right: 6px">主題</span>
          <select id="themeSelect" class="theme-select">
            <option value="pink">粉紅膠囊</option>
            <option value="starry">星空色</option>
            <option value="matcha">抹茶拿鐵</option>
            <option value="sunset">夕陽橘</option>
          </select>
        </label>
      </div>
      <p class="subtitle">把今天的想法貼進來，一鍵整理成可愛好讀的小回報。</p>

      <textarea id="diaryInput" placeholder="例：今天早上開會有點緊張，但下午完成了重要提案，心情變超好！"></textarea>
      <div class="controls">
        <button class="organize-btn" id="organizeBtn">整理日記</button>
        <button class="clear-btn" id="clearBtn">清空全部</button>
        <button class="copy-all-btn" id="copyAllBtn">一鍵複製全部</button>
      </div>

      <section class="mood-helper">
        <p class="mood-helper-title">今日情緒快捷鍵（懶得打字版）</p>
        <div class="mood-buttons">
          <button class="mood-btn" data-mood="開心、被愛、有活力">🥺❤️ 開心</button>
          <button class="mood-btn" data-mood="混亂、卡住、腦袋打結">😵‍💫 混亂</button>
          <button class="mood-btn" data-mood="感動、被治癒、想抱抱">🥹 感動</button>
          <button class="mood-btn" data-mood="吐槽、無言、但還是撐住">🙄🤌 吐槽</button>
          <button class="mood-btn" data-mood="累、想躺平、需要充電">😴 累</button>
        </div>
      </section>

      <div class="tomorrow-wrap">
        <label for="tomorrowNoteInput">明天要記得</label>
        <textarea id="tomorrowNoteInput" placeholder="例：早上 9:00 前寄出會議簡報、記得買牛奶。"></textarea>
      </div>

      <section class="grid">
        <article class="card">
          <div class="card-head">
            <h2>今日日記</h2>
            <button class="copy-btn" data-copy="fullDiary">一鍵複製</button>
          </div>
          <p class="output" id="fullDiary">（整理後會顯示在這裡）</p>
        </article>

        <article class="card">
          <div class="card-head">
            <h2>小蝦蝦版短版回報</h2>
            <button class="copy-btn" data-copy="shortReport">一鍵複製</button>
          </div>
          <p class="output" id="shortReport">（整理後會顯示在這裡）</p>
        </article>

        <article class="card">
          <div class="card-head">
            <h2>今日金句</h2>
            <button class="copy-btn" data-copy="quote">一鍵複製</button>
          </div>
          <p class="output" id="quote">（整理後會顯示在這裡）</p>
        </article>

        <article class="card">
          <div class="card-head">
            <h2>今日情緒關鍵字</h2>
            <button class="copy-btn" data-copy="mood">一鍵複製</button>
          </div>
          <p class="output" id="mood">（整理後會顯示在這裡）</p>
        </article>
      </section>

      <p class="encouragement" id="encouragement">（整理完會跳出一句小鼓勵）</p>

      <p class="hint">小提醒：這是前端離線小工具，內容不會被上傳。</p>
    </main>

    <script>
      const input = document.getElementById("diaryInput");
      const organizeBtn = document.getElementById("organizeBtn");
      const clearBtn = document.getElementById("clearBtn");
      const copyAllBtn = document.getElementById("copyAllBtn");
      const themeSelect = document.getElementById("themeSelect");
      const todayDate = document.getElementById("todayDate");
      const tomorrowNoteInput = document.getElementById("tomorrowNoteInput");
      const outputs = {
        fullDiary: document.getElementById("fullDiary"),
        shortReport: document.getElementById("shortReport"),
        quote: document.getElementById("quote"),
        mood: document.getElementById("mood"),
      };
      const storageKey = "danDanDiaryData";
      const themeStorageKey = "danDanDiaryTheme";
      const encouragementEl = document.getElementById("encouragement");

      const encouragements = [
        "你已經很努力了，今天先給自己一個小愛心。",
        "慢慢來也沒關係，你不是在比賽啦。",
        "有做到一點點，就值得被誇一點點。",
        "今天辛苦了，明天的你會接住現在的你。",
        "卡住不等於失敗，只是腦袋在整理檔案。",
        "先喝口水，再往前一步，這樣就很棒。",
        "你不是沒進步，只是進步得很低調。",
        "累了就休息，休息不是偷懶是續命。",
        "今天的你有撐住，真的很可以。",
        "不用完美，能誠實記錄就已經超讚。",
      ];

      const defaultOutputs = {
        fullDiary: "（整理後會顯示在這裡）",
        shortReport: "（整理後會顯示在這裡）",
        quote: "（整理後會顯示在這裡）",
        mood: "（整理後會顯示在這裡）",
      };

      const defaultEncouragement = "（整理完會跳出一句小鼓勵）";

      const moodMap = [
        { key: "開心", words: ["開心", "快樂", "興奮", "滿足"] },
        { key: "緊張", words: ["緊張", "焦慮", "壓力", "不安"] },
        { key: "感恩", words: ["感謝", "感恩", "幸運", "珍惜"] },
        { key: "疲憊", words: ["累", "疲憊", "睏", "沒力"] },
        { key: "平靜", words: ["平靜", "放鬆", "穩定", "安心"] },
      ];

      const themes = {
        pink: {
          bg: "#fff8fc",
          bgAccent: "#ffeaf5",
          card: "#ffffff",
          cardSoft: "#fffcfe",
          primary: "#ff7eb6",
          primaryDark: "#ff5da6",
          text: "#4b3e4d",
          muted: "#8f7b8f",
          line: "#f7d5e7",
          shadow: "rgba(255, 126, 182, 0.14)",
          btnSoftBg: "#ffe2f0",
          btnSoftText: "#9e3e71",
          btnSoftHover: "#ffd0e6",
        },
        starry: {
          bg: "#0f1226",
          bgAccent: "#1a2148",
          card: "#1b2345",
          cardSoft: "#212b52",
          primary: "#7fa8ff",
          primaryDark: "#a6beff",
          text: "#e5ebff",
          muted: "#b6c0eb",
          line: "#3b467e",
          shadow: "rgba(8, 12, 30, 0.45)",
          btnSoftBg: "#2f3d72",
          btnSoftText: "#d8e0ff",
          btnSoftHover: "#3b4a84",
        },
        matcha: {
          bg: "#f5f7ed",
          bgAccent: "#e5efdb",
          card: "#ffffff",
          cardSoft: "#f8fbf2",
          primary: "#7da869",
          primaryDark: "#5f8550",
          text: "#394635",
          muted: "#6f7d67",
          line: "#d6e3c6",
          shadow: "rgba(94, 127, 85, 0.14)",
          btnSoftBg: "#e8f1da",
          btnSoftText: "#4f6647",
          btnSoftHover: "#dce9c9",
        },
        sunset: {
          bg: "#fff4e9",
          bgAccent: "#ffe2cb",
          card: "#ffffff",
          cardSoft: "#fffaf4",
          primary: "#f08a4b",
          primaryDark: "#d86d2f",
          text: "#573f33",
          muted: "#8c6b5a",
          line: "#f3ceb3",
          shadow: "rgba(200, 116, 56, 0.18)",
          btnSoftBg: "#ffe4cf",
          btnSoftText: "#8a512f",
          btnSoftHover: "#ffd4b3",
        },
      };

      function applyTheme(themeName) {
        const theme = themes[themeName] || themes.pink;
        const root = document.documentElement;
        root.style.setProperty("--bg", theme.bg);
        root.style.setProperty("--bg-accent", theme.bgAccent);
        root.style.setProperty("--card", theme.card);
        root.style.setProperty("--card-soft", theme.cardSoft);
        root.style.setProperty("--primary", theme.primary);
        root.style.setProperty("--primary-dark", theme.primaryDark);
        root.style.setProperty("--text", theme.text);
        root.style.setProperty("--muted", theme.muted);
        root.style.setProperty("--line", theme.line);
        root.style.setProperty("--shadow", theme.shadow);
        root.style.setProperty("--btn-soft-bg", theme.btnSoftBg);
        root.style.setProperty("--btn-soft-text", theme.btnSoftText);
        root.style.setProperty("--btn-soft-hover", theme.btnSoftHover);
      }

      function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}/${month}/${day}`;
      }

      function renderTodayDate() {
        todayDate.textContent = `今日日期：${formatDate(new Date())}`;
      }

      function loadTheme() {
        const savedTheme = localStorage.getItem(themeStorageKey);
        const themeName = themes[savedTheme] ? savedTheme : "pink";
        themeSelect.value = themeName;
        applyTheme(themeName);
      }

      function splitSentences(text) {
        return text
          .split(/[。！？!?.\n]/)
          .map((s) => s.trim())
          .filter(Boolean);
      }

      function getMoodKeywords(text) {
        const found = moodMap
          .filter((item) => item.words.some((word) => text.includes(word)))
          .map((item) => item.key);

        if (found.length) return found.join("、");
        return "平穩、努力、前進";
      }

      function organizeDiary(rawText) {
        const text = rawText.trim();
        if (!text) {
          return {
            fullDiary: "請先輸入今天的日記內容喔～",
            shortReport: "尚未有內容可整理。",
            quote: "今天也值得一句溫柔的鼓勵。",
            mood: "待補充",
          };
        }

        const sentences = splitSentences(text);
        const opening = sentences[0] || "今天努力地過了一天";
        const ending = sentences[sentences.length - 1] || opening;

        const shortReport = `今天重點：${opening}。\n目前進度：${ending}。\n整體來說，有在穩穩前進！`;
        const quote = `「${ending.replace(/[，,]$/, "")}，我做得到。」`;

        return {
          fullDiary: text,
          shortReport,
          quote,
          mood: getMoodKeywords(text),
        };
      }

      function getRandomEncouragement() {
        const index = Math.floor(Math.random() * encouragements.length);
        return encouragements[index];
      }

      function applyOutputs(data) {
        Object.entries(outputs).forEach(([key, el]) => {
          el.textContent = data[key] || defaultOutputs[key];
        });
      }

      function saveData() {
        const payload = {
          input: input.value,
          tomorrowNote: tomorrowNoteInput.value,
          encouragement: encouragementEl.textContent,
          outputs: Object.fromEntries(
            Object.entries(outputs).map(([key, el]) => [key, el.textContent])
          ),
        };
        localStorage.setItem(storageKey, JSON.stringify(payload));
      }

      function loadData() {
        const stored = localStorage.getItem(storageKey);
        if (!stored) return;

        try {
          const data = JSON.parse(stored);
          input.value = data.input || "";
          tomorrowNoteInput.value = data.tomorrowNote || "";
          encouragementEl.textContent = data.encouragement || defaultEncouragement;
          applyOutputs(data.outputs || {});
        } catch {
          localStorage.removeItem(storageKey);
        }
      }

      organizeBtn.addEventListener("click", () => {
        const result = organizeDiary(input.value);
        applyOutputs(result);
        encouragementEl.textContent = getRandomEncouragement();
        saveData();
      });

      document.querySelectorAll(".mood-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const moodText = btn.dataset.mood || "";
          outputs.mood.textContent = moodText;
          saveData();
        });
      });

      input.addEventListener("input", saveData);
      tomorrowNoteInput.addEventListener("input", saveData);

      clearBtn.addEventListener("click", () => {
        input.value = "";
        tomorrowNoteInput.value = "";
        applyOutputs(defaultOutputs);
        encouragementEl.textContent = defaultEncouragement;
        localStorage.removeItem(storageKey);
      });

      copyAllBtn.addEventListener("click", async () => {
        const message = [
          `📅 日期：${formatDate(new Date())}`,
          "",
          `【今日日記】\n${outputs.fullDiary.textContent}`,
          "",
          `【小蝦蝦版短版回報】\n${outputs.shortReport.textContent}`,
          "",
          `【今日金句】\n${outputs.quote.textContent}`,
          "",
          `【今日情緒關鍵字】\n${outputs.mood.textContent}`,
          "",
          `【明天要記得】\n${tomorrowNoteInput.value.trim() || "（尚未填寫）"}`,
        ].join("\n");

        try {
          await navigator.clipboard.writeText(message);
          const oldText = copyAllBtn.textContent;
          copyAllBtn.textContent = "全部已複製！";
          setTimeout(() => {
            copyAllBtn.textContent = oldText;
          }, 1200);
        } catch {
          alert("複製失敗，請手動複製文字。\n\n" + message);
        }
      });

      themeSelect.addEventListener("change", () => {
        const selected = themeSelect.value;
        applyTheme(selected);
        localStorage.setItem(themeStorageKey, selected);
      });

      document.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const key = btn.dataset.copy;
          const text = outputs[key].textContent;
          try {
            await navigator.clipboard.writeText(text);
            const oldText = btn.textContent;
            btn.textContent = "已複製！";
            setTimeout(() => {
              btn.textContent = oldText;
            }, 1000);
          } catch {
            alert("複製失敗，請手動複製文字。");
          }
        });
      });

      renderTodayDate();
      loadTheme();
      loadData();
    </script>
  </body>
</html>
