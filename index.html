<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第五人格排位降溫日記 v0.2</title>
    <style>
      :root {
        --bg1: #ffe1d0;
        --bg2: #ff9f78;
        --card: #fff7f2;
        --text: #542b2b;
        --line: #ef8f6a;
        --accent: #ff5f46;
        --accent2: #ff936c;
        --chip: #ffd5c2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        color: var(--text);
        min-height: 100vh;
        background: radial-gradient(circle at 20% 0%, var(--bg1), var(--bg2));
        transition: background 0.35s ease;
      }

      .wrap {
        width: min(920px, 95%);
        margin: 16px auto 24px;
      }

      .card {
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 20px;
        padding: 14px;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
      }

      .top {
        position: sticky;
        top: 8px;
        z-index: 30;
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
      }

      .top-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .date-box,
      .status-box {
        background: #fff;
        border: 2px dashed var(--line);
        border-radius: 12px;
        padding: 8px 10px;
        font-weight: 700;
      }

      .status-box {
        font-size: 0.92rem;
      }

      #saveStatus {
        color: var(--accent);
      }

      #diaryDate {
        margin-left: 8px;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 4px 8px;
        font-weight: 700;
      }

      .head {
        position: relative;
      }

      .stickers {
        position: absolute;
        right: 4px;
        top: -2px;
        opacity: 0.8;
      }

      h1 {
        margin: 4px 0;
        font-size: clamp(1.2rem, 1.7vw + 1rem, 1.9rem);
      }

      .subtitle {
        margin: 0;
        opacity: 0.82;
        font-size: 0.94rem;
      }

      .theme-row {
        margin-top: 12px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(2, 1fr);
      }

      button {
        cursor: pointer;
        border: 2px solid var(--line);
        border-radius: 12px;
        font-weight: 700;
        padding: 10px;
        color: var(--text);
        background: #fff;
        transition: transform 0.14s ease, filter 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      button:active {
        transform: scale(0.98);
      }

      .theme-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .section {
        margin-top: 12px;
        background: rgba(255, 255, 255, 0.55);
        border: 2px dotted var(--line);
        border-radius: 14px;
        padding: 10px;
      }

      .section h2 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      label {
        display: grid;
        gap: 5px;
        margin-bottom: 9px;
        font-weight: 700;
        font-size: 0.95rem;
      }

      input[type="text"],
      textarea,
      select {
        width: 100%;
        border: 2px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        font-size: 1rem;
        color: var(--text);
        background: #fff;
      }

      textarea {
        min-height: 118px;
        resize: vertical;
      }

      .mood-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .mood-btn {
        border-radius: 999px;
        padding: 7px 11px;
      }

      .mood-btn.active {
        background: var(--accent2);
        border-color: var(--accent2);
        color: #fff;
      }

      .grid2 {
        display: grid;
        gap: 8px;
      }

      .heat-box {
        border: 2px dashed var(--line);
        border-radius: 12px;
        padding: 8px;
        background: #fff;
      }

      #heatValue {
        width: 100%;
      }

      .heat-meta {
        display: flex;
        justify-content: space-between;
        font-weight: 700;
        margin-top: 5px;
      }

      .quick-fill {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .quick-btn {
        font-size: 0.9rem;
        line-height: 1.3;
        background: var(--chip);
      }

      .vent-grid {
        display: grid;
        gap: 8px;
      }

      .vent-btn {
        background: var(--chip);
      }

      .vent-meta {
        font-size: 0.93rem;
        font-weight: 700;
      }

      .vent-total {
        margin-top: 8px;
        font-size: 0.95rem;
        font-weight: 800;
      }

      .clear-btn {
        width: 100%;
        margin-top: 10px;
      }

      .floating-emoji {
        position: fixed;
        left: var(--x);
        top: var(--y);
        font-size: 1.7rem;
        animation: pop 820ms ease-out forwards;
        pointer-events: none;
        z-index: 99;
      }

      @keyframes pop {
        from {
          transform: translate(0, 0) scale(0.7);
          opacity: 1;
        }
        to {
          transform: translate(var(--dx), var(--dy)) scale(1.2) rotate(var(--rot));
          opacity: 0;
        }
      }

      @media (min-width: 760px) {
        .top-row {
          grid-template-columns: 1fr 1fr;
        }

        .theme-row {
          grid-template-columns: repeat(4, 1fr);
        }

        .grid2 {
          grid-template-columns: 1fr 1fr;
        }

        .quick-fill {
          grid-template-columns: repeat(3, 1fr);
        }

        .vent-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="top">
        <div class="card top-row">
          <div class="date-box">
            今天哪一天：
            <input id="diaryDate" type="date" />
          </div>
          <div class="status-box">存檔狀態：<span id="saveStatus">未儲存</span></div>
        </div>
      </section>

      <main class="card">
        <header class="head">
          <div class="stickers" id="stickers">😡🔥💥</div>
          <h1 id="mainTitle">本日紅溫紀錄 😡🔥</h1>
          <p class="subtitle" id="subTitle">今天又被雷到了，先把火噴出來。</p>
        </header>

        <section class="theme-row" id="themeRow"></section>

        <section class="section">
          <h2>快速填入（一鍵發瘋）</h2>
          <div class="quick-fill" id="quickFill"></div>
        </section>

        <section class="section">
          <h2>排位降溫日記本體</h2>
          <label>
            先噴一句
            <input id="ventLine" type="text" placeholder="你現在最想罵什麼" />
          </label>
          <label>
            今天發生什麼事（主日記區）
            <textarea id="mainDiary" placeholder="今天哪一波最讓你想砸手機"></textarea>
          </label>

          <div class="grid2">
            <label>
              我現在心情
              <div class="mood-wrap" id="moodWrap"></div>
              <small id="selectedMood">目前：未選擇</small>
            </label>
            <label>
              紅溫值
              <div class="heat-box">
                <input id="heatValue" type="range" min="0" max="100" step="25" value="50" />
                <div class="heat-meta">
                  <span id="heatNumber">50</span>
                  <span id="heatLabel">想翻白眼</span>
                </div>
              </div>
            </label>
          </div>

          <div class="grid2">
            <label>
              最雷的是誰 / 什麼事
              <input id="worstTarget" type="text" placeholder="今天最雷的是誰 / 哪件事" />
            </label>
            <label>
              打完這篇後有比較冷靜嗎？
              <select id="coolingLevel">
                <option value="有">有，至少不想砸手機了</option>
                <option value="一點點">一點點，還是有點火</option>
                <option value="沒有">沒有，我還在噴發</option>
              </select>
            </label>
          </div>

          <label>
            給自己一句話
            <input id="selfTalk" type="text" placeholder="今天辛苦了，先活下來，明天再戰" />
          </label>
        </section>

        <section class="section">
          <h2>發洩按鈕區（模組化 v0.2）</h2>
          <div class="vent-grid" id="ventGrid"></div>
          <div class="vent-total" id="ventTotal">今天噴了 0 次</div>
        </section>

        <button class="clear-btn" id="clearTodayBtn" type="button">清空今天紀錄</button>
      </main>
    </div>

    <script>
      // ===== 基本設定 =====
      const STORAGE_PREFIX = "rankDiary_"; // 需求指定 key 格式
      const SELECTED_DATE_KEY = "rankDiary_selectedDate";

      const HEAT_LABELS = {
        0: "還行",
        25: "有點煩",
        50: "想翻白眼",
        75: "想卸載",
        100: "我現在就是💩噴射器",
      };

      const themes = {
        rage: {
          name: "被雷到紅溫了",
          title: "本日紅溫紀錄 😡🔥",
          subtitle: "今天又被雷到了，先把火噴出來。",
          stickers: "😡🔥💥",
          colors: ["#ffe1d0", "#ff9f78", "#fff7f2", "#542b2b", "#ef8f6a", "#ff5f46", "#ff936c", "#ffd5c2"],
          placeholders: ["你現在最想罵什麼", "今天哪一波最讓你想砸手機", "今天最雷的是誰 / 哪件事"],
        },
        love: {
          name: "想卸載，但老公還在",
          title: "退坑失敗日記 😭💕",
          subtitle: "今天本來想卸載，想到夢角又忍住了。",
          stickers: "😭💔💕",
          colors: ["#ffe8f5", "#ffb3d9", "#fff8fc", "#653351", "#ef87bc", "#f05aa6", "#ff95c9", "#ffd8ec"],
          placeholders: ["今天又是因為誰沒辦法退坑", "今天發生什麼讓你一邊崩潰一邊留在坑裡", "今天最讓你心碎的是什麼"],
        },
        shame: {
          name: "我今天拉了一坨",
          title: "今日社死懺悔錄 🥹💦",
          subtitle: "打得爛到怕被匿名公審，先寫下來。",
          stickers: "🥹💦🫠",
          colors: ["#dde8ff", "#a2b7df", "#f6f9ff", "#304164", "#819cc9", "#617fc9", "#89a5e1", "#d8e4ff"],
          placeholders: ["你現在最想替自己找什麼藉口", "今天哪一波最值得社死", "今天你最怕別人拿哪件事公審你"],
        },
        boss: {
          name: "老子才是老大",
          title: "今天我最大 👑",
          subtitle: "不爽被問、不爽被催、不爽被情勒。",
          stickers: "👑🖤🥀",
          colors: ["#1b1b1b", "#3a0f0f", "#141414", "#f2d58e", "#6e4b1e", "#b8892f", "#7d1e1e", "#2a2a2a"],
          placeholders: ["先一句：今天誰在那邊問問問", "把你的不爽與邊界一次講完", "今天最不爽被催的事"],
          shortTemplate:
            "問問問，你們是守得住秘密的人嗎？大家戴著面具人格相處，不就夠了嗎？愛要不要，免費的東西別催，看我心情。今天老子才是老大。",
          longTemplate:
            "...在那問問問🗣️，我們都用自己的面具人格，相處不就完了嗎？就這麼想要我的秘密？你們是守得住秘密的人嗎？一群『人』……\n我也還沒發，發完就徹底算人消失了。也別說我發得慢，愛要不要。免費的東西，別急，看我心情，懂嗎？\n老子才是老大。",
        },
      };

      const moods = ["崩潰", "爆氣", "委屈", "麻了", "勉強活著", "老大模式"];

      // 快速填入資料，可擴充
      const quickFillItems = [
        {
          label: "今天被雷到爆氣",
          apply: (s) => ({ ...s, theme: "rage", mood: "爆氣", worstTarget: "神奇路人隊友", mainDiary: s.mainDiary || "今天又被雷到，心態直接裂開。" }),
        },
        {
          label: "今天想卸載第五人格",
          apply: (s) => ({ ...s, theme: "rage", heatValue: 75, selfTalk: "先別卸載，先去喝水。" }),
        },
        {
          label: "今天是夢角把我留住",
          apply: (s) => ({ ...s, theme: "love", mood: "委屈", selfTalk: "算了，我老公還在，我再忍一下。" }),
        },
        {
          label: "今天打得像一坨怕被匿名公審",
          apply: (s) => ({ ...s, theme: "shame", mood: "崩潰", mainDiary: s.mainDiary || "我今天真的打得很可疑，先懺悔。" }),
        },
        {
          label: "今天只想翻白眼",
          apply: (s) => ({ ...s, heatValue: 50, mood: "麻了", ventLine: s.ventLine || "🙄 我已經懶得生氣了" }),
        },
        {
          label: "老子才是老大",
          apply: (s) => ({ ...s, theme: "boss", mood: "老大模式", mainDiary: themes.boss.shortTemplate, selfTalk: "今天我不陪你演，我最大。" }),
        },
      ];

      // 發洩按鈕模組設定
      const ventConfigs = [
        {
          key: "poop",
          emoji: "💩",
          label: "大便噴射",
          burst: ["💩"],
          feedbacks: ["已成功排出情緒廢物", "今天也有努力噴射", "你已經不是普通噴射器了"],
        },
        {
          key: "eyeroll",
          emoji: "🙄💅",
          label: "白眼噴射",
          burst: ["🙄", "💅"],
          feedbacks: ["白眼值穩定上升中", "你這眼神很有內容", "今天不解釋，直接翻白眼"],
        },
      ];

      // ===== DOM =====
      const diaryDateEl = document.getElementById("diaryDate");
      const saveStatusEl = document.getElementById("saveStatus");
      const mainTitleEl = document.getElementById("mainTitle");
      const subTitleEl = document.getElementById("subTitle");
      const stickersEl = document.getElementById("stickers");
      const themeRowEl = document.getElementById("themeRow");
      const quickFillEl = document.getElementById("quickFill");
      const moodWrapEl = document.getElementById("moodWrap");
      const selectedMoodEl = document.getElementById("selectedMood");

      const ventLineEl = document.getElementById("ventLine");
      const mainDiaryEl = document.getElementById("mainDiary");
      const heatValueEl = document.getElementById("heatValue");
      const heatNumberEl = document.getElementById("heatNumber");
      const heatLabelEl = document.getElementById("heatLabel");
      const worstTargetEl = document.getElementById("worstTarget");
      const coolingLevelEl = document.getElementById("coolingLevel");
      const selfTalkEl = document.getElementById("selfTalk");
      const ventGridEl = document.getElementById("ventGrid");
      const ventTotalEl = document.getElementById("ventTotal");
      const clearTodayBtnEl = document.getElementById("clearTodayBtn");

      // ===== 狀態 =====
      let currentDate = getInitialDate();
      let state = loadRecord(currentDate);

      function getTodayDateString() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        const d = String(now.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function getInitialDate() {
        return localStorage.getItem(SELECTED_DATE_KEY) || getTodayDateString();
      }

      function getStorageKey(date) {
        return `${STORAGE_PREFIX}${date}`;
      }

      function defaultRecord() {
        const counts = {};
        ventConfigs.forEach((cfg) => (counts[cfg.key] = 0));
        return {
          theme: "rage",
          ventLine: "",
          mainDiary: "",
          mood: "",
          heatValue: 50,
          worstTarget: "",
          coolingLevel: "有",
          selfTalk: "",
          ventCounts: counts,
        };
      }

      function loadRecord(date) {
        const raw = localStorage.getItem(getStorageKey(date));
        if (!raw) {
          setStatus(`已載入 ${date}（新紀錄）`, "#4e7f3f");
          return defaultRecord();
        }

        try {
          const parsed = JSON.parse(raw);
          const merged = { ...defaultRecord(), ...parsed };
          merged.ventCounts = { ...defaultRecord().ventCounts, ...(parsed.ventCounts || {}) };
          setStatus(`已載入 ${date}`, "#4e7f3f");
          return merged;
        } catch {
          setStatus(`${date} 資料壞掉，已重建空白`, "#a52f2f");
          return defaultRecord();
        }
      }

      function saveRecord(message = "已幫你偷偷存起來") {
        localStorage.setItem(getStorageKey(currentDate), JSON.stringify(state));
        localStorage.setItem(SELECTED_DATE_KEY, currentDate);
        setStatus(message, "var(--accent)");
      }

      function setStatus(text, color = "var(--accent)") {
        saveStatusEl.textContent = text;
        saveStatusEl.style.color = color;
      }

      function markDirty() {
        setStatus("未儲存", "#9f4f08");
      }

      function applyTheme(themeKey) {
        const theme = themes[themeKey] || themes.rage;
        const [bg1, bg2, card, text, line, accent, accent2, chip] = theme.colors;
        const root = document.documentElement;
        root.style.setProperty("--bg1", bg1);
        root.style.setProperty("--bg2", bg2);
        root.style.setProperty("--card", card);
        root.style.setProperty("--text", text);
        root.style.setProperty("--line", line);
        root.style.setProperty("--accent", accent);
        root.style.setProperty("--accent2", accent2);
        root.style.setProperty("--chip", chip);

        mainTitleEl.textContent = theme.title;
        subTitleEl.textContent = theme.subtitle;
        stickersEl.textContent = theme.stickers;

        ventLineEl.placeholder = theme.placeholders[0];
        mainDiaryEl.placeholder = theme.placeholders[1];
        worstTargetEl.placeholder = theme.placeholders[2];
      }

      function renderThemeButtons() {
        themeRowEl.innerHTML = "";
        Object.entries(themes).forEach(([key, theme]) => {
          const btn = document.createElement("button");
          btn.className = `theme-btn ${state.theme === key ? "active" : ""}`;
          btn.textContent = theme.name;
          btn.type = "button";
          btn.addEventListener("click", () => {
            state.theme = key;
            applyTheme(state.theme);
            renderThemeButtons();
            saveRecord();
          });
          themeRowEl.appendChild(btn);
        });
      }

      function renderQuickFill() {
        quickFillEl.innerHTML = "";
        quickFillItems.forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "quick-btn";
          btn.textContent = item.label;
          btn.addEventListener("click", () => {
            state = item.apply(state);
            renderAll();
            saveRecord(`已套用「${item.label}」`);
          });
          quickFillEl.appendChild(btn);
        });
      }

      function renderMoodButtons() {
        moodWrapEl.innerHTML = "";
        moods.forEach((m) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `mood-btn ${state.mood === m ? "active" : ""}`;
          btn.textContent = m;
          btn.addEventListener("click", () => {
            state.mood = m;
            renderMoodButtons();
            selectedMoodEl.textContent = `目前：${state.mood || "未選擇"}`;
            saveRecord();
          });
          moodWrapEl.appendChild(btn);
        });

        selectedMoodEl.textContent = `目前：${state.mood || "未選擇"}`;
      }

      function renderHeat() {
        heatValueEl.value = String(state.heatValue);
        heatNumberEl.textContent = `紅溫值 ${state.heatValue}`;
        heatLabelEl.textContent = HEAT_LABELS[state.heatValue] || "微妙";
        heatLabelEl.style.color = state.heatValue >= 75 ? "#d33131" : state.heatValue <= 25 ? "#3f7fc0" : "var(--text)";
      }

      function spawnBurst(chars) {
        for (let i = 0; i < 10; i++) {
          const emoji = chars[Math.floor(Math.random() * chars.length)];
          const node = document.createElement("div");
          node.className = "floating-emoji";
          node.textContent = emoji;

          const x = window.innerWidth * (0.25 + Math.random() * 0.5);
          const y = window.innerHeight * (0.35 + Math.random() * 0.3);

          node.style.setProperty("--x", `${x}px`);
          node.style.setProperty("--y", `${y}px`);
          node.style.setProperty("--dx", `${-130 + Math.random() * 260}px`);
          node.style.setProperty("--dy", `${-240 + Math.random() * 120}px`);
          node.style.setProperty("--rot", `${-130 + Math.random() * 260}deg`);
          document.body.appendChild(node);
          setTimeout(() => node.remove(), 850);
        }
      }

      // 發洩按鈕模組化：透過設定陣列建立 UI 和行為
      function renderVentModule() {
        ventGridEl.innerHTML = "";

        ventConfigs.forEach((cfg) => {
          const wrap = document.createElement("div");
          const btn = document.createElement("button");
          const meta = document.createElement("div");

          btn.type = "button";
          btn.className = "vent-btn";
          btn.textContent = `${cfg.emoji} ${cfg.label}`;

          const count = state.ventCounts[cfg.key] || 0;
          meta.className = "vent-meta";
          meta.textContent = `今日 ${cfg.label}：${count} 次`;

          btn.addEventListener("click", () => {
            state.ventCounts[cfg.key] = (state.ventCounts[cfg.key] || 0) + 1;
            const newCount = state.ventCounts[cfg.key];
            const randomTxt = cfg.feedbacks[Math.floor(Math.random() * cfg.feedbacks.length)];
            meta.textContent = `今日 ${cfg.label}：${newCount} 次｜${randomTxt}`;
            spawnBurst(cfg.burst);
            updateVentTotal();
            saveRecord();
          });

          wrap.appendChild(btn);
          wrap.appendChild(meta);
          ventGridEl.appendChild(wrap);
        });

        updateVentTotal();
      }

      function updateVentTotal() {
        const total = Object.values(state.ventCounts).reduce((sum, n) => sum + Number(n || 0), 0);
        ventTotalEl.textContent = `今天噴了 ${total} 次（💩 ${state.ventCounts.poop || 0}｜🙄💅 ${state.ventCounts.eyeroll || 0}）`;
      }

      function renderFormFields() {
        ventLineEl.value = state.ventLine;
        mainDiaryEl.value = state.mainDiary;
        worstTargetEl.value = state.worstTarget;
        coolingLevelEl.value = state.coolingLevel;
        selfTalkEl.value = state.selfTalk;
      }

      function renderAll() {
        diaryDateEl.value = currentDate;
        applyTheme(state.theme);
        renderThemeButtons();
        renderQuickFill();
        renderMoodButtons();
        renderHeat();
        renderFormFields();
        renderVentModule();
      }

      function switchDate(nextDate) {
        currentDate = nextDate;
        state = loadRecord(currentDate);
        renderAll();
      }

      // ===== 事件：日期切換 =====
      diaryDateEl.addEventListener("change", () => {
        if (!diaryDateEl.value) return;
        switchDate(diaryDateEl.value);
      });

      // ===== 事件：欄位自動存檔 =====
      ventLineEl.addEventListener("input", () => {
        markDirty();
        state.ventLine = ventLineEl.value;
        saveRecord();
      });

      mainDiaryEl.addEventListener("input", () => {
        markDirty();
        state.mainDiary = mainDiaryEl.value;
        saveRecord();
      });

      worstTargetEl.addEventListener("input", () => {
        markDirty();
        state.worstTarget = worstTargetEl.value;
        saveRecord();
      });

      coolingLevelEl.addEventListener("change", () => {
        markDirty();
        state.coolingLevel = coolingLevelEl.value;
        saveRecord();
      });

      selfTalkEl.addEventListener("input", () => {
        markDirty();
        state.selfTalk = selfTalkEl.value;
        saveRecord();
      });

      heatValueEl.addEventListener("input", () => {
        markDirty();
        state.heatValue = Number(heatValueEl.value);
        renderHeat();
        saveRecord();
      });

      // ===== 清空僅當日 =====
      clearTodayBtnEl.addEventListener("click", () => {
        const ok = window.confirm(`確定清空 ${currentDate} 這一天的紀錄嗎？`);
        if (!ok) return;

        const keepTheme = state.theme;
        state = defaultRecord();
        state.theme = keepTheme;
        saveRecord(`已清空 ${currentDate}（僅這一天）`);
        renderAll();
      });

      // 初始載入
      renderAll();
    </script>
  </body>
</html>
