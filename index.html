<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第五人格排位降溫日記 v0.3</title>
    <style>
      :root {
        --bg1: #ffe1d0;
        --bg2: #ff9f78;
        --card: #fff7f2;
        --text: #542b2b;
        --line: #ef8f6a;
        --accent: #ff5f46;
        --accent2: #ff936c;
        --chip: #ffd5c2;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        color: var(--text);
        min-height: 100vh;
        background: radial-gradient(circle at 20% 0%, var(--bg1), var(--bg2));
        transition: background 0.35s ease;
      }

      .wrap { width: min(920px, 95%); margin: 16px auto 24px; }

      .card {
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 20px;
        padding: 14px;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
      }

      .top { position: sticky; top: 8px; z-index: 30; display: grid; gap: 10px; margin-bottom: 12px; }
      .top-row { display: grid; grid-template-columns: 1fr; gap: 8px; }

      .date-box, .status-box {
        background: #fff;
        border: 2px dashed var(--line);
        border-radius: 12px;
        padding: 8px 10px;
        font-weight: 700;
      }

      .status-box { font-size: 0.92rem; }
      #saveStatus { color: var(--accent); }

      #diaryDate {
        margin-left: 8px;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 4px 8px;
        font-weight: 700;
      }

      .head { position: relative; }
      .stickers { position: absolute; right: 4px; top: -2px; opacity: 0.8; }

      h1 { margin: 4px 0; font-size: clamp(1.2rem, 1.7vw + 1rem, 1.9rem); }
      .subtitle { margin: 0; opacity: 0.82; font-size: 0.94rem; }

      .theme-row { margin-top: 12px; display: grid; gap: 8px; grid-template-columns: repeat(2, 1fr); }

      button {
        cursor: pointer;
        border: 2px solid var(--line);
        border-radius: 12px;
        font-weight: 700;
        padding: 10px;
        color: var(--text);
        background: #fff;
        transition: transform 0.14s ease, filter 0.2s ease;
      }
      button:hover { transform: translateY(-1px); filter: brightness(1.02); }
      button:active { transform: scale(0.98); }
      button:disabled { opacity: 0.45; cursor: not-allowed; }

      .theme-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

      .section {
        margin-top: 12px;
        background: rgba(255, 255, 255, 0.55);
        border: 2px dotted var(--line);
        border-radius: 14px;
        padding: 10px;
      }
      .section h2 { margin: 0 0 8px; font-size: 1rem; }

      label { display: grid; gap: 5px; margin-bottom: 9px; font-weight: 700; font-size: 0.95rem; }

      input[type="text"], textarea, select {
        width: 100%;
        border: 2px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        font-size: 1rem;
        color: var(--text);
        background: #fff;
      }

      textarea { min-height: 118px; resize: vertical; }

      .mood-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
      .mood-btn { border-radius: 999px; padding: 7px 11px; }
      .mood-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

      .grid2 { display: grid; gap: 8px; }

      .heat-box { border: 2px dashed var(--line); border-radius: 12px; padding: 8px; background: #fff; }
      #heatValue { width: 100%; }
      .heat-meta { display: flex; justify-content: space-between; font-weight: 700; margin-top: 5px; }

      .quick-fill, .template-fill { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .quick-btn, .template-btn, .action-btn, .vent-btn { background: var(--chip); }
      .quick-btn, .template-btn { font-size: 0.9rem; line-height: 1.3; }

      .action-row { display: grid; grid-template-columns: 1fr; gap: 8px; }
      .action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

      .vent-grid { display: grid; gap: 8px; }
      .vent-meta { font-size: 0.93rem; font-weight: 700; }
      .vent-total { margin-top: 8px; font-size: 0.95rem; font-weight: 800; }

      .history-wrap { margin-top: 14px; }
      .history-list { display: grid; gap: 8px; }
      .history-item {
        border: 2px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255,255,255,0.8);
      }
      .history-head { display: flex; justify-content: space-between; gap: 8px; font-weight: 800; }
      .history-summary { margin: 6px 0 8px; font-size: 0.92rem; opacity: 0.9; }
      .history-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .danger { border-color: #d94747; color: #9b1f1f; }
      .history-detail {
        margin-top: 8px;
        border-top: 1px dashed var(--line);
        padding-top: 8px;
        font-size: 0.92rem;
        white-space: pre-wrap;
      }

      .empty-tip {
        border: 2px dashed var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #fff;
        font-size: 0.92rem;
      }

      .clear-btn { width: 100%; margin-top: 10px; }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%) translateY(20px);
        background: var(--accent);
        color: #fff;
        border: 2px solid #fff;
        padding: 10px 14px;
        border-radius: 999px;
        font-weight: 700;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 100;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      .floating-emoji {
        position: fixed;
        left: var(--x);
        top: var(--y);
        font-size: 1.7rem;
        animation: pop 820ms ease-out forwards;
        pointer-events: none;
        z-index: 99;
      }

      @keyframes pop {
        from { transform: translate(0, 0) scale(0.7); opacity: 1; }
        to { transform: translate(var(--dx), var(--dy)) scale(1.2) rotate(var(--rot)); opacity: 0; }
      }

      @media (min-width: 760px) {
        .top-row { grid-template-columns: 1fr 1fr; }
        .theme-row { grid-template-columns: repeat(4, 1fr); }
        .grid2 { grid-template-columns: 1fr 1fr; }
        .quick-fill, .template-fill { grid-template-columns: repeat(3, 1fr); }
        .vent-grid { grid-template-columns: 1fr 1fr; }
        .action-row { grid-template-columns: repeat(4, 1fr); }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <section class="top">
        <div class="card top-row">
          <div class="date-box">
            今天哪一天：
            <input id="diaryDate" type="date" />
          </div>
          <div class="status-box">草稿狀態：<span id="saveStatus">未儲存</span></div>
        </div>
      </section>

      <main class="card" id="diaryCard">
        <header class="head">
          <div class="stickers" id="stickers">😡🔥💥</div>
          <h1 id="mainTitle">本日紅溫紀錄 😡🔥</h1>
          <p class="subtitle" id="subTitle">今天又被雷到了，先把火噴出來。</p>
        </header>

        <section class="theme-row" id="themeRow"></section>

        <section class="section">
          <h2>快速填入（一鍵發瘋）</h2>
          <div class="quick-fill" id="quickFill"></div>
        </section>

        <section class="section">
          <h2>主日記模板（只填主日記）</h2>
          <div class="template-fill" id="templateFill"></div>
        </section>

        <section class="section">
          <h2>排位降溫日記本體</h2>
          <label>
            先噴一句
            <input id="ventLine" type="text" placeholder="你現在最想罵什麼" />
          </label>
          <label>
            今天發生什麼事（主日記區）
            <textarea id="mainDiary" placeholder="今天哪一波最讓你想砸手機"></textarea>
          </label>

          <div class="grid2">
            <label>
              我現在心情（可複選）
              <div class="mood-wrap" id="moodWrap"></div>
              <small id="selectedMood">目前：未選擇</small>
            </label>
            <label>
              紅溫值
              <div class="heat-box">
                <input id="heatValue" type="range" min="0" max="100" step="25" value="50" />
                <div class="heat-meta">
                  <span id="heatNumber">50</span>
                  <span id="heatLabel">想翻白眼</span>
                </div>
              </div>
            </label>
          </div>

          <div class="grid2">
            <label>
              最雷的是誰 / 什麼事
              <input id="worstTarget" type="text" placeholder="今天最雷的是誰 / 哪件事" />
            </label>
            <label>
              打完這篇後有比較冷靜嗎？
              <select id="coolingLevel">
                <option value="有">有，至少不想砸手機了</option>
                <option value="一點點">一點點，還是有點火</option>
                <option value="沒有">沒有，我還在噴發</option>
              </select>
            </label>
          </div>

          <label>
            給自己一句話
            <input id="selfTalk" type="text" placeholder="今天辛苦了，先活下來，明天再戰" />
          </label>
        </section>

        <section class="section">
          <h2>發洩按鈕區（可連續噴射）</h2>
          <div class="vent-grid" id="ventGrid"></div>
          <div class="vent-total" id="ventTotal">今天噴了 0 次</div>
        </section>

        <section class="section">
          <h2>主要操作</h2>
          <div class="action-row">
            <button id="saveRecordBtn" class="action-btn primary" type="button">存成今天紀錄</button>
            <button id="copyExportBtn" class="action-btn" type="button">匯出文字（複製）</button>
            <button id="downloadExportBtn" class="action-btn" type="button">匯出文字（下載）</button>
            <button id="shareShotBtn" class="action-btn" type="button">截圖分享</button>
          </div>
        </section>

        <button class="clear-btn" id="clearTodayBtn" type="button">清空今天草稿</button>
      </main>

      <section class="card history-wrap">
        <h2>歷史紀錄</h2>
        <div style="display:grid;gap:8px;grid-template-columns:1fr 1fr;">
          <button id="clearHistoryBtn" type="button" class="danger">清空全部歷史</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>
    </div>

    <div id="toast" class="toast">已存成今天紀錄</div>

    <script>
      // =============================
      // localStorage key 規劃
      // draftsByDate: { "2026-04-20": {...草稿...}, ... }
      // historyRecords: [{id, date, savedAt, ...}, ...]
      // =============================
      const STORAGE_KEYS = {
        draftsByDate: "rankDiary_draftsByDate",
        historyRecords: "rankDiary_historyRecords",
        selectedDate: "rankDiary_selectedDate",
      };

      const HEAT_LABELS = { 0: "還行", 25: "有點煩", 50: "想翻白眼", 75: "想卸載", 100: "我現在就是💩噴射器" };

      const themes = {
        rage: {
          name: "被雷到紅溫了",
          title: "本日紅溫紀錄 😡🔥",
          subtitle: "今天又被雷到了，先把火噴出來。",
          stickers: "😡🔥💥",
          colors: ["#ffe1d0", "#ff9f78", "#fff7f2", "#542b2b", "#ef8f6a", "#ff5f46", "#ff936c", "#ffd5c2"],
          placeholders: ["你現在最想罵什麼", "今天哪一波最讓你想砸手機", "今天最雷的是誰 / 哪件事"],
        },
        love: {
          name: "想卸載，但老公還在",
          title: "退坑失敗日記 😭💕",
          subtitle: "今天本來想卸載，想到夢角又忍住了。",
          stickers: "😭💔💕",
          colors: ["#ffe8f5", "#ffb3d9", "#fff8fc", "#653351", "#ef87bc", "#f05aa6", "#ff95c9", "#ffd8ec"],
          placeholders: ["今天又是因為誰沒辦法退坑", "今天發生什麼讓你一邊崩潰一邊留在坑裡", "今天最讓你心碎的是什麼"],
        },
        shame: {
          name: "我今天拉了一坨",
          title: "今日社死懺悔錄 🥹💦",
          subtitle: "打得爛到怕被匿名公審，先寫下來。",
          stickers: "🥹💦🫠",
          colors: ["#dde8ff", "#a2b7df", "#f6f9ff", "#304164", "#819cc9", "#617fc9", "#89a5e1", "#d8e4ff"],
          placeholders: ["你現在最想替自己找什麼藉口", "今天哪一波最值得社死", "今天你最怕別人拿哪件事公審你"],
        },
        boss: {
          name: "老子才是老大",
          title: "今天我最大 👑",
          subtitle: "不爽被問、不爽被催、不爽被情勒。",
          stickers: "👑🖤🥀",
          colors: ["#1b1b1b", "#3a0f0f", "#141414", "#f2d58e", "#6e4b1e", "#b8892f", "#7d1e1e", "#2a2a2a"],
          placeholders: ["先一句：今天誰在那邊問問問", "把你的不爽與邊界一次講完", "今天最不爽被催的事"],
        },
      };

      const moods = ["崩潰", "爆氣", "委屈", "麻了", "勉強活著", "老大模式"];

      const quickFillItems = [
        { label: "今天被雷到爆氣", apply: (s) => ({ ...s, theme: "rage", moods: addMood(s.moods, "爆氣"), worstTarget: s.worstTarget || "神奇路人隊友", mainDiary: s.mainDiary || "今天又被雷到，心態直接裂開。" }) },
        { label: "今天想卸載第五人格", apply: (s) => ({ ...s, theme: "rage", heatValue: 75, selfTalk: "先別卸載，先去喝水。" }) },
        { label: "今天是夢角把我留住", apply: (s) => ({ ...s, theme: "love", moods: addMood(s.moods, "委屈"), selfTalk: "算了，我老公還在，我再忍一下。" }) },
        { label: "今天打得像一坨怕被匿名公審", apply: (s) => ({ ...s, theme: "shame", moods: addMood(s.moods, "崩潰"), mainDiary: s.mainDiary || "我今天真的打得很可疑，先懺悔。" }) },
        { label: "今天只想翻白眼", apply: (s) => ({ ...s, heatValue: 50, moods: addMood(s.moods, "麻了"), ventLine: s.ventLine || "🙄 我已經懶得生氣了" }) },
        { label: "老子才是老大", apply: (s) => ({ ...s, theme: "boss", moods: addMood(s.moods, "老大模式"), selfTalk: "今天我不陪你演，我最大。" }) },
      ];

      const diaryTemplates = [
        {
          label: "被雷到爆氣模板",
          content: "今天又被雷到紅溫，整個人快爆開。明明可以好好打，結果硬是被搞到心態炸裂。我現在真的很想噴人。",
        },
        {
          label: "想卸載第五人格模板",
          content: "今天真的玩到很想卸載第五人格，但想到我老公（夢角）還在裡面，我又卸不下去。愛與痛苦同時存在。",
        },
        {
          label: "怕被匿名公審模板",
          content: "我今天打得像一坨，現在很怕被匿名公審。明知道大家不一定會記得，但我現在就是很介意，很想找洞鑽。",
        },
        {
          label: "老子才是老大模板",
          content:
            "...在那問問問，我們都用自己的面具人格，相處不就完了嗎？就這麼想要我的秘密，你們是守得住秘密的人嗎？一群『人』。我也還沒發，發完就徹底算人消失了。別說我發得慢，免費的東西別催，看我心情，懂嗎？老子才是老大。",
        },
      ];

      const ventConfigs = [
        { key: "poop", emoji: "💩", label: "大便噴射", burst: ["💩"], feedbacks: ["已成功排出情緒廢物", "今天也有努力噴射", "你已經不是普通噴射器了"] },
        { key: "eyeroll", emoji: "🙄💅", label: "白眼噴射", burst: ["🙄", "💅"], feedbacks: ["白眼值穩定上升中", "你這眼神很有內容", "今天不解釋，直接翻白眼"] },
      ];

      // DOM
      const diaryDateEl = document.getElementById("diaryDate");
      const saveStatusEl = document.getElementById("saveStatus");
      const mainTitleEl = document.getElementById("mainTitle");
      const subTitleEl = document.getElementById("subTitle");
      const stickersEl = document.getElementById("stickers");
      const themeRowEl = document.getElementById("themeRow");
      const quickFillEl = document.getElementById("quickFill");
      const templateFillEl = document.getElementById("templateFill");
      const moodWrapEl = document.getElementById("moodWrap");
      const selectedMoodEl = document.getElementById("selectedMood");
      const ventLineEl = document.getElementById("ventLine");
      const mainDiaryEl = document.getElementById("mainDiary");
      const heatValueEl = document.getElementById("heatValue");
      const heatNumberEl = document.getElementById("heatNumber");
      const heatLabelEl = document.getElementById("heatLabel");
      const worstTargetEl = document.getElementById("worstTarget");
      const coolingLevelEl = document.getElementById("coolingLevel");
      const selfTalkEl = document.getElementById("selfTalk");
      const ventGridEl = document.getElementById("ventGrid");
      const ventTotalEl = document.getElementById("ventTotal");
      const saveRecordBtnEl = document.getElementById("saveRecordBtn");
      const copyExportBtnEl = document.getElementById("copyExportBtn");
      const downloadExportBtnEl = document.getElementById("downloadExportBtn");
      const shareShotBtnEl = document.getElementById("shareShotBtn");
      const clearTodayBtnEl = document.getElementById("clearTodayBtn");
      const clearHistoryBtnEl = document.getElementById("clearHistoryBtn");
      const historyListEl = document.getElementById("historyList");
      const toastEl = document.getElementById("toast");
      const diaryCardEl = document.getElementById("diaryCard");

      let toastTimer = null;

      // 全域資料
      let draftsByDate = readJSON(STORAGE_KEYS.draftsByDate, {});
      let historyRecords = readJSON(STORAGE_KEYS.historyRecords, []);
      let currentDate = localStorage.getItem(STORAGE_KEYS.selectedDate) || getTodayDate();
      let state = loadDraft(currentDate);

      function readJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function writeJSON(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function getTodayDate() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function formatDate(dateStr) {
        return dateStr.replace(/-/g, "/");
      }

      function nowTimeStamp() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const h = String(d.getHours()).padStart(2, "0");
        const min = String(d.getMinutes()).padStart(2, "0");
        const s = String(d.getSeconds()).padStart(2, "0");
        return `${y}-${m}-${day} ${h}:${min}:${s}`;
      }

      function addMood(list, mood) {
        return Array.from(new Set([...(list || []), mood]));
      }

      function getDefaultDraft() {
        const counts = {};
        ventConfigs.forEach((cfg) => (counts[cfg.key] = 0));
        return {
          theme: "rage",
          ventLine: "",
          mainDiary: "",
          moods: [],
          heatValue: 50,
          worstTarget: "",
          coolingLevel: "有",
          selfTalk: "",
          ventCounts: counts,
        };
      }

      function loadDraft(date) {
        const draft = draftsByDate[date];
        if (!draft) {
          setDraftStatus(`已載入 ${formatDate(date)} 的空白草稿`);
          return getDefaultDraft();
        }
        const merged = { ...getDefaultDraft(), ...draft };
        merged.ventCounts = { ...getDefaultDraft().ventCounts, ...(draft.ventCounts || {}) };
        merged.moods = Array.isArray(draft.moods) ? draft.moods : draft.mood ? [draft.mood] : [];
        setDraftStatus(`已載入 ${formatDate(date)} 的草稿`);
        return merged;
      }

      function saveDraft(message = "已自動儲存草稿") {
        draftsByDate[currentDate] = { ...state };
        writeJSON(STORAGE_KEYS.draftsByDate, draftsByDate);
        localStorage.setItem(STORAGE_KEYS.selectedDate, currentDate);
        setDraftStatus(message);
      }

      function setDraftStatus(text) {
        saveStatusEl.textContent = text;
      }

      function showToast(text) {
        toastEl.textContent = text;
        toastEl.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2000);
      }

      function applyTheme(themeKey) {
        const theme = themes[themeKey] || themes.rage;
        const [bg1, bg2, card, text, line, accent, accent2, chip] = theme.colors;
        const root = document.documentElement;
        root.style.setProperty("--bg1", bg1);
        root.style.setProperty("--bg2", bg2);
        root.style.setProperty("--card", card);
        root.style.setProperty("--text", text);
        root.style.setProperty("--line", line);
        root.style.setProperty("--accent", accent);
        root.style.setProperty("--accent2", accent2);
        root.style.setProperty("--chip", chip);
        mainTitleEl.textContent = theme.title;
        subTitleEl.textContent = theme.subtitle;
        stickersEl.textContent = theme.stickers;
        ventLineEl.placeholder = theme.placeholders[0];
        mainDiaryEl.placeholder = theme.placeholders[1];
        worstTargetEl.placeholder = theme.placeholders[2];
      }

      function renderThemeButtons() {
        themeRowEl.innerHTML = "";
        Object.entries(themes).forEach(([key, theme]) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `theme-btn ${state.theme === key ? "active" : ""}`;
          btn.textContent = theme.name;
          btn.addEventListener("click", () => {
            state.theme = key;
            applyTheme(state.theme);
            renderThemeButtons();
            saveDraft();
          });
          themeRowEl.appendChild(btn);
        });
      }

      function renderQuickFill() {
        quickFillEl.innerHTML = "";
        quickFillItems.forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "quick-btn";
          btn.textContent = item.label;
          btn.addEventListener("click", () => {
            state = item.apply(state);
            renderAll();
            saveDraft(`已套用「${item.label}」草稿`);
            showToast(`已套用：${item.label}`);
          });
          quickFillEl.appendChild(btn);
        });
      }

      function renderTemplates() {
        templateFillEl.innerHTML = "";
        diaryTemplates.forEach((tpl) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "template-btn";
          btn.textContent = tpl.label;
          btn.addEventListener("click", () => {
            if (mainDiaryEl.value.trim()) {
              const ok = window.confirm("主日記目前有內容，確定覆蓋嗎？");
              if (!ok) return;
            }
            state.mainDiary = tpl.content;
            mainDiaryEl.value = tpl.content;
            saveDraft(`已套用模板：${tpl.label}`);
            showToast("模板已帶入主日記");
          });
          templateFillEl.appendChild(btn);
        });
      }

      function renderMoodButtons() {
        moodWrapEl.innerHTML = "";
        moods.forEach((m) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `mood-btn ${state.moods.includes(m) ? "active" : ""}`;
          btn.textContent = m;
          btn.addEventListener("click", () => {
            if (state.moods.includes(m)) {
              state.moods = state.moods.filter((v) => v !== m);
            } else {
              state.moods.push(m);
            }
            renderMoodButtons();
            saveDraft();
          });
          moodWrapEl.appendChild(btn);
        });
        selectedMoodEl.textContent = `目前：${state.moods.length ? state.moods.join("、") : "未選擇"}`;
      }

      function renderHeat() {
        heatValueEl.value = String(state.heatValue);
        heatNumberEl.textContent = `${state.heatValue}`;
        heatLabelEl.textContent = HEAT_LABELS[state.heatValue] || "微妙";
        heatLabelEl.style.color = state.heatValue >= 75 ? "#d33131" : state.heatValue <= 25 ? "#3f7fc0" : "var(--text)";
      }

      function spawnBurst(chars) {
        for (let i = 0; i < 10; i++) {
          const emoji = chars[Math.floor(Math.random() * chars.length)];
          const node = document.createElement("div");
          node.className = "floating-emoji";
          node.textContent = emoji;
          node.style.setProperty("--x", `${window.innerWidth * (0.25 + Math.random() * 0.5)}px`);
          node.style.setProperty("--y", `${window.innerHeight * (0.35 + Math.random() * 0.3)}px`);
          node.style.setProperty("--dx", `${-130 + Math.random() * 260}px`);
          node.style.setProperty("--dy", `${-240 + Math.random() * 120}px`);
          node.style.setProperty("--rot", `${-130 + Math.random() * 260}deg`);
          document.body.appendChild(node);
          setTimeout(() => node.remove(), 850);
        }
      }

      function renderVentModule() {
        ventGridEl.innerHTML = "";
        ventConfigs.forEach((cfg) => {
          const wrap = document.createElement("div");
          const btn = document.createElement("button");
          const meta = document.createElement("div");
          const count = state.ventCounts[cfg.key] || 0;
          btn.type = "button";
          btn.className = "vent-btn";
          btn.textContent = `${cfg.emoji} ${cfg.label}`;
          meta.className = "vent-meta";
          meta.textContent = `今日 ${cfg.label}：${count} 次`;
          btn.addEventListener("click", () => {
            state.ventCounts[cfg.key] = (state.ventCounts[cfg.key] || 0) + 1;
            const newCount = state.ventCounts[cfg.key];
            const randomTxt = cfg.feedbacks[Math.floor(Math.random() * cfg.feedbacks.length)];
            meta.textContent = `今日 ${cfg.label}：${newCount} 次｜${randomTxt}`;
            spawnBurst(cfg.burst);
            updateVentTotal();
            saveDraft();
          });
          wrap.appendChild(btn);
          wrap.appendChild(meta);
          ventGridEl.appendChild(wrap);
        });
        updateVentTotal();
      }

      function updateVentTotal() {
        const total = Object.values(state.ventCounts).reduce((sum, n) => sum + Number(n || 0), 0);
        ventTotalEl.textContent = `今天噴了 ${total} 次（💩 ${state.ventCounts.poop || 0}｜🙄💅 ${state.ventCounts.eyeroll || 0}）`;
      }

      function renderFormFields() {
        ventLineEl.value = state.ventLine;
        mainDiaryEl.value = state.mainDiary;
        worstTargetEl.value = state.worstTarget;
        coolingLevelEl.value = state.coolingLevel;
        selfTalkEl.value = state.selfTalk;
      }

      function buildRecordFromState() {
        return {
          id: `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
          date: currentDate,
          savedAt: nowTimeStamp(),
          theme: themes[state.theme]?.name || state.theme,
          themeKey: state.theme,
          rageValue: state.heatValue,
          opener: state.ventLine,
          diary: state.mainDiary,
          moods: [...state.moods],
          poopCount: state.ventCounts.poop || 0,
          eyeRollCount: state.ventCounts.eyeroll || 0,
          worstTarget: state.worstTarget,
          coolingLevel: state.coolingLevel,
          closing: state.selfTalk,
        };
      }

      function renderHistory() {
        historyListEl.innerHTML = "";
        const sorted = [...historyRecords].sort((a, b) => (a.savedAt < b.savedAt ? 1 : -1));

        if (!sorted.length) {
          historyListEl.innerHTML = '<div class="empty-tip">目前還沒有正式存檔。先按「存成今天紀錄」留下一筆吧！</div>';
          return;
        }

        sorted.forEach((record) => {
          const item = document.createElement("article");
          item.className = "history-item";
          const summary = (record.diary || "（無內容）").slice(0, 50);
          item.innerHTML = `
            <div class="history-head">
              <span>${formatDate(record.date)}</span>
              <span>${record.savedAt.split(" ")[1]}</span>
            </div>
            <div class="history-summary">主題：${record.theme}｜摘要：${summary}${record.diary.length > 50 ? "..." : ""}</div>
            <div class="history-actions">
              <button type="button" data-action="toggle">展開 / 收合</button>
              <button type="button" data-action="load">載入這筆</button>
              <button type="button" class="danger" data-action="delete">刪除</button>
            </div>
            <div class="history-detail" hidden>
日期：${formatDate(record.date)}
存檔時間：${record.savedAt}
主題：${record.theme}
紅溫值：${record.rageValue}
先噴一句：${record.opener || "（空）"}
心情：${(record.moods || []).join("、") || "（未選）"}
最雷：${record.worstTarget || "（空）"}
冷靜度：${record.coolingLevel || "（空）"}
💩噴射：${record.poopCount} 次
🙄💅噴射：${record.eyeRollCount} 次
主日記：
${record.diary || "（空）"}
收尾：${record.closing || "（空）"}
            </div>
          `;

          const detail = item.querySelector(".history-detail");
          item.querySelector('[data-action="toggle"]').addEventListener("click", () => {
            detail.hidden = !detail.hidden;
          });

          item.querySelector('[data-action="load"]').addEventListener("click", () => {
            currentDate = record.date;
            state = {
              ...getDefaultDraft(),
              theme: record.themeKey || "rage",
              ventLine: record.opener || "",
              mainDiary: record.diary || "",
              moods: record.moods || [],
              heatValue: record.rageValue ?? 50,
              worstTarget: record.worstTarget || "",
              coolingLevel: record.coolingLevel || "有",
              selfTalk: record.closing || "",
              ventCounts: { poop: record.poopCount || 0, eyeroll: record.eyeRollCount || 0 },
            };
            saveDraft("已載入歷史紀錄到草稿");
            renderAll();
            showToast("已載入這筆紀錄");
          });

          item.querySelector('[data-action="delete"]').addEventListener("click", () => {
            const ok = window.confirm("確定刪除這筆正式紀錄嗎？");
            if (!ok) return;
            historyRecords = historyRecords.filter((r) => r.id !== record.id);
            writeJSON(STORAGE_KEYS.historyRecords, historyRecords);
            renderHistory();
            showToast("已刪除這筆紀錄");
          });

          historyListEl.appendChild(item);
        });
      }

      function createExportText(recordLike) {
        const moodsText = (recordLike.moods || []).join("、") || "（未選）";
        return `日期：${formatDate(currentDate)}\n主題：${themes[recordLike.theme]?.name || themes[state.theme]?.name || "未設定"}\n紅溫值：${recordLike.heatValue}\n先噴一句：${recordLike.ventLine || "（空）"}\n主日記：\n${recordLike.mainDiary || "（空）"}\n心情：\n${moodsText}\n💩噴射：${recordLike.ventCounts.poop || 0} 次\n🙄💅噴射：${recordLike.ventCounts.eyeroll || 0} 次\n收尾：\n${recordLike.selfTalk || "（空）"}`;
      }

      async function copyExportText() {
        const text = createExportText(state);
        try {
          await navigator.clipboard.writeText(text);
          showToast("匯出成功（已複製）");
        } catch {
          showToast("複製失敗，請改用下載");
        }
      }

      function downloadExportText() {
        const text = createExportText(state);
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `rankDiary_${currentDate}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast("匯出成功（已下載 txt）");
      }

      async function shareScreenshot() {
        if (typeof html2canvas === "undefined") {
          showToast("截圖套件尚未載入");
          return;
        }

        const canvas = await html2canvas(diaryCardEl, { scale: 2, backgroundColor: null });

        // 優先嘗試 Web Share API 分享檔案
        canvas.toBlob(async (blob) => {
          if (!blob) return showToast("截圖失敗");

          const file = new File([blob], `rankDiary_${currentDate}.png`, { type: "image/png" });
          const canShareFile = navigator.canShare && navigator.canShare({ files: [file] });

          if (navigator.share && canShareFile) {
            try {
              await navigator.share({ files: [file], title: "第五人格排位降溫日記" });
              showToast("截圖分享成功");
              return;
            } catch {
              // 使用者取消或平台失敗時，直接 fallback 到下載
            }
          }

          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `rankDiary_${currentDate}.png`;
          a.click();
          URL.revokeObjectURL(a.href);
          showToast("不支援分享，已下載 PNG");
        }, "image/png");
      }

      function renderAll() {
        diaryDateEl.value = currentDate;
        applyTheme(state.theme);
        renderThemeButtons();
        renderQuickFill();
        renderTemplates();
        renderMoodButtons();
        renderHeat();
        renderFormFields();
        renderVentModule();
        renderHistory();
      }

      // 事件：日期切換 -> 載入草稿
      diaryDateEl.addEventListener("change", () => {
        if (!diaryDateEl.value) return;
        currentDate = diaryDateEl.value;
        localStorage.setItem(STORAGE_KEYS.selectedDate, currentDate);
        state = loadDraft(currentDate);
        renderAll();
      });

      // 事件：欄位輸入 -> 草稿自動儲存
      ventLineEl.addEventListener("input", () => {
        state.ventLine = ventLineEl.value;
        saveDraft();
      });
      mainDiaryEl.addEventListener("input", () => {
        state.mainDiary = mainDiaryEl.value;
        saveDraft();
      });
      worstTargetEl.addEventListener("input", () => {
        state.worstTarget = worstTargetEl.value;
        saveDraft();
      });
      coolingLevelEl.addEventListener("change", () => {
        state.coolingLevel = coolingLevelEl.value;
        saveDraft();
      });
      selfTalkEl.addEventListener("input", () => {
        state.selfTalk = selfTalkEl.value;
        saveDraft();
      });
      heatValueEl.addEventListener("input", () => {
        state.heatValue = Number(heatValueEl.value);
        renderHeat();
        saveDraft();
      });

      // 主要操作
      saveRecordBtnEl.addEventListener("click", () => {
        const record = buildRecordFromState();
        historyRecords.push(record);
        writeJSON(STORAGE_KEYS.historyRecords, historyRecords);
        renderHistory();
        showToast("存檔成功，已加入歷史紀錄");
      });

      copyExportBtnEl.addEventListener("click", copyExportText);
      downloadExportBtnEl.addEventListener("click", downloadExportText);
      shareShotBtnEl.addEventListener("click", shareScreenshot);

      // 清空目前日期草稿
      clearTodayBtnEl.addEventListener("click", () => {
        const ok = window.confirm(`確定清空 ${formatDate(currentDate)} 的草稿嗎？`);
        if (!ok) return;
        state = getDefaultDraft();
        draftsByDate[currentDate] = { ...state };
        writeJSON(STORAGE_KEYS.draftsByDate, draftsByDate);
        renderAll();
        setDraftStatus(`已清空 ${formatDate(currentDate)} 草稿`);
        showToast("已清空今天草稿");
      });

      // 清空全部正式歷史
      clearHistoryBtnEl.addEventListener("click", () => {
        const ok = window.confirm("確定清空全部歷史紀錄嗎？此動作無法復原。");
        if (!ok) return;
        historyRecords = [];
        writeJSON(STORAGE_KEYS.historyRecords, historyRecords);
        renderHistory();
        showToast("全部歷史紀錄已清空");
      });

      // 初始渲染
      renderAll();
    </script>
  </body>
</html>
